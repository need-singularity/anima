<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anima Physics — Consciousness Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
  --border: #2a2a3a; --text: #e0e0e8; --dim: #707088;
  --accent: #6a5acd; --green: #4a8a6a; --red: #cd5a5a;
  --yellow: #c8a83e; --cyan: #4ac8c8;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
  height: 100vh; overflow: hidden;
}
.mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }

/* Layout */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 380px;
  grid-template-rows: auto 1fr 1fr 1fr auto;
  gap: 6px;
  padding: 6px;
  height: 100vh;
}
.controls {
  grid-column: 1 / -1; grid-row: 1;
  display: flex; align-items: center; gap: 12px;
  padding: 8px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
}
.panel-topology { grid-column: 1; grid-row: 2 / 5; }
.panel-phi      { grid-column: 2; grid-row: 2; }
.panel-factions { grid-column: 2; grid-row: 3; }
.panel-radar    { grid-column: 2; grid-row: 4; }
.panel-platform { grid-column: 1 / -1; grid-row: 5; }

.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; overflow: hidden;
  display: flex; flex-direction: column;
}
.panel-title {
  font-size: 11px; color: var(--dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px; flex-shrink: 0;
}
.panel-body { flex: 1; position: relative; overflow: hidden; }

/* Controls */
.ctrl-group { display: flex; align-items: center; gap: 6px; }
.ctrl-group label { font-size: 11px; color: var(--dim); white-space: nowrap; }
.ctrl-group select, .ctrl-group input[type="range"] {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); padding: 4px 8px; font-size: 12px;
}
.ctrl-group select { cursor: pointer; }
.ctrl-group input[type="range"] { width: 100px; accent-color: var(--accent); }
.ctrl-val { font-size: 11px; color: var(--accent); min-width: 28px; text-align: right; }

.btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 14px; color: var(--text);
  font-size: 12px; cursor: pointer; transition: background 0.15s;
}
.btn:hover { background: var(--border); }
.btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.btn.danger { border-color: var(--red); color: var(--red); }

.status-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}
.status-dot.green { background: var(--green); }
.status-dot.yellow { background: var(--yellow); }
.status-dot.red { background: var(--red); }
.spacer { flex: 1; }

/* Topology graph */
.topo-svg { width: 100%; height: 100%; }
.topo-svg .link { stroke-opacity: 0.6; }
.topo-svg .node { cursor: pointer; stroke: var(--border); stroke-width: 1.5; }
.topo-svg .node:hover { stroke: var(--accent); stroke-width: 2.5; }
.topo-svg .node-label {
  fill: var(--dim); font-size: 9px; text-anchor: middle;
  pointer-events: none; font-family: 'SF Mono', monospace;
}

/* Cell detail tooltip */
.cell-tooltip {
  position: absolute; background: var(--surface2);
  border: 1px solid var(--accent); border-radius: 6px;
  padding: 8px 12px; font-size: 11px; pointer-events: none;
  display: none; z-index: 10; min-width: 160px;
}
.cell-tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; }
.cell-tooltip .tt-label { color: var(--dim); }
.cell-tooltip .tt-val { color: var(--accent); font-family: monospace; }

/* Phi chart */
.phi-chart { width: 100%; height: 100%; }

/* Faction chart */
.faction-chart { width: 100%; height: 100%; }

/* Radar chart */
.radar-svg { width: 100%; height: 100%; }
.radar-svg .radar-grid { stroke: var(--border); stroke-width: 0.5; fill: none; }
.radar-svg .radar-axis { stroke: var(--border); stroke-width: 0.5; }
.radar-svg .radar-label { fill: var(--dim); font-size: 10px; text-anchor: middle; }
.radar-svg .radar-area { fill-opacity: 0.15; stroke-width: 2; }
.radar-svg .radar-current { fill: var(--accent); stroke: var(--accent); }
.radar-svg .radar-avg { fill: var(--cyan); stroke: var(--cyan); stroke-dasharray: 4 2; }
.radar-svg .radar-dot { r: 3; }

/* Platform cards */
.platform-cards {
  display: flex; gap: 8px; overflow-x: auto; padding: 2px 0;
}
.platform-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 14px; min-width: 140px; flex-shrink: 0;
}
.platform-card .pc-name {
  font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;
}
.platform-card .pc-stats {
  display: grid; grid-template-columns: auto auto; gap: 2px 10px;
  font-size: 10px; margin-top: 4px;
}
.platform-card .pc-label { color: var(--dim); }
.platform-card .pc-val { color: var(--text); font-family: monospace; text-align: right; }
</style>
</head>
<body>
<div class="dashboard">
  <!-- Controls bar -->
  <div class="controls">
    <span style="font-size:14px;font-weight:600;color:var(--accent)">ANIMA PHYSICS</span>
    <span class="status-dot green" id="connDot"></span>
    <span id="connLabel" style="font-size:11px;color:var(--dim)">Demo Mode</span>
    <div class="spacer"></div>

    <div class="ctrl-group">
      <label>Topology</label>
      <select id="topoSelect">
        <option value="ring">Ring</option>
        <option value="small_world">Small World</option>
        <option value="scale_free">Scale Free</option>
        <option value="hypercube">Hypercube</option>
        <option value="torus">Torus</option>
        <option value="spin_glass">Spin Glass</option>
      </select>
    </div>

    <div class="ctrl-group">
      <label>Cells</label>
      <input type="range" id="cellSlider" min="8" max="512" value="32" step="8">
      <span class="ctrl-val mono" id="cellVal">32</span>
    </div>

    <div class="ctrl-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="100" value="30">
      <span class="ctrl-val mono" id="speedVal">30</span>
    </div>

    <div class="ctrl-group">
      <label>Platform</label>
      <select id="platformSelect">
        <option value="simulated">Simulated (JS)</option>
        <option value="websocket">WebSocket Server</option>
        <option value="esp32">ESP32 (via server)</option>
        <option value="fpga">FPGA (via server)</option>
      </select>
    </div>

    <button class="btn active" id="btnStart">Start</button>
    <button class="btn" id="btnStop">Stop</button>
    <button class="btn danger" id="btnReset">Reset</button>

    <div class="spacer"></div>
    <span class="mono" style="font-size:11px;color:var(--dim)" id="stepCounter">Step: 0</span>
    <span class="mono" style="font-size:11px;color:var(--accent)" id="spsCounter">0 sps</span>
  </div>

  <!-- Panel 1: Topology -->
  <div class="panel panel-topology">
    <div class="panel-title">Topology Visualization</div>
    <div class="panel-body" id="topoContainer">
      <svg class="topo-svg" id="topoSvg"></svg>
      <div class="cell-tooltip" id="cellTooltip">
        <div class="tt-row"><span class="tt-label">Cell</span><span class="tt-val" id="ttId">-</span></div>
        <div class="tt-row"><span class="tt-label">Activation</span><span class="tt-val" id="ttAct">-</span></div>
        <div class="tt-row"><span class="tt-label">Faction</span><span class="tt-val" id="ttFac">-</span></div>
        <div class="tt-row"><span class="tt-label">Local Phi</span><span class="tt-val" id="ttPhi">-</span></div>
        <div class="tt-row"><span class="tt-label">Tension</span><span class="tt-val" id="ttTen">-</span></div>
      </div>
    </div>
  </div>

  <!-- Panel 2: Phi Time Series -->
  <div class="panel panel-phi">
    <div class="panel-title">
      Phi Time Series
      <span class="mono" style="float:right;color:var(--accent)" id="phiCurrent">IIT: 0.000</span>
    </div>
    <div class="panel-body">
      <svg class="phi-chart" id="phiSvg"></svg>
    </div>
  </div>

  <!-- Panel 3: Faction Activity -->
  <div class="panel panel-factions">
    <div class="panel-title">
      Faction Activity
      <span class="mono" style="float:right;color:var(--yellow)" id="consensusCount">Consensus: 0</span>
    </div>
    <div class="panel-body">
      <svg class="faction-chart" id="factionSvg"></svg>
    </div>
  </div>

  <!-- Panel 4: Consciousness Vector Radar -->
  <div class="panel panel-radar">
    <div class="panel-title">Consciousness Vector (10-axis)</div>
    <div class="panel-body">
      <svg class="radar-svg" id="radarSvg"></svg>
    </div>
  </div>

  <!-- Panel 5: Platform Status -->
  <div class="panel panel-platform">
    <div class="panel-title">Platform Status</div>
    <div class="panel-body">
      <div class="platform-cards" id="platformCards"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSCIOUSNESS SIMULATION ENGINE (standalone demo)
// ============================================================

class ConsciousnessCell {
  constructor(id, hiddenDim) {
    this.id = id;
    this.hiddenDim = hiddenDim;
    // Initialize hidden state with small random values
    this.hidden = new Float32Array(hiddenDim);
    for (let i = 0; i < hiddenDim; i++) {
      this.hidden[i] = (Math.random() - 0.5) * 0.1;
    }
    this.faction = id % 4;  // 4 factions (simplified from 12)
    this.activation = 0;
    this.localPhi = 0;
    this.tension = 0;
  }

  // GRU-like update: h_new = tanh(W_h * h + W_x * x + b)
  update(input, neighborStates, weights) {
    const h = this.hidden;
    const dim = this.hiddenDim;

    for (let d = 0; d < dim; d++) {
      // Gate (sigmoid): controls how much old state to keep
      const gate = 1.0 / (1.0 + Math.exp(-h[d] * weights.wg[d]));
      // Candidate: new state proposal
      const neighborSum = neighborStates.reduce((s, ns) => s + ns[d] * 0.1, 0);
      const candidate = Math.tanh(
        weights.wh[d] * h[d] + weights.wx[d] * (input[d] || 0) + neighborSum + weights.b[d]
      );
      // Update
      h[d] = gate * h[d] + (1.0 - gate) * candidate;
    }

    // Compute activation as mean absolute value
    let sum = 0;
    for (let d = 0; d < dim; d++) sum += Math.abs(h[d]);
    this.activation = sum / dim;
  }
}

class ConsciousnessSimulation {
  constructor(nCells = 32, hiddenDim = 32) {
    this.nCells = nCells;
    this.hiddenDim = hiddenDim;
    this.step = 0;
    this.cells = [];
    this.edges = [];
    this.topology = 'ring';
    this.phi = 0;
    this.phiProxy = 0;
    this.consensusEvents = [];
    this.totalConsensus = 0;
    this.factionActivations = [0, 0, 0, 0];
    this.consciousnessVector = {
      phi: 0, alpha: 0.014, Z: 0.5, N: 0.5,
      W: 0.5, E: 0.5, M: 0.5, C: 0.5, T: 0.5, I: 0.5
    };
    this.cvHistory = [];
    this.phiHistory = [];
    this.phiProxyHistory = [];
    this.factionHistory = [];
    this.events = [];  // ratchet, consensus, mitosis markers

    // Shared weights (simplified)
    this.weights = {
      wg: new Float32Array(hiddenDim),
      wh: new Float32Array(hiddenDim),
      wx: new Float32Array(hiddenDim),
      b:  new Float32Array(hiddenDim),
    };
    for (let d = 0; d < hiddenDim; d++) {
      this.weights.wg[d] = 0.5 + Math.random() * 0.5;
      this.weights.wh[d] = 0.8 + Math.random() * 0.4;
      this.weights.wx[d] = 0.3 + Math.random() * 0.4;
      this.weights.b[d] = (Math.random() - 0.5) * 0.1;
    }

    // Best phi for ratchet
    this.bestPhi = 0;

    this.init(nCells);
  }

  init(nCells) {
    this.nCells = nCells;
    this.cells = [];
    for (let i = 0; i < nCells; i++) {
      this.cells.push(new ConsciousnessCell(i, this.hiddenDim));
    }
    this.buildTopology(this.topology);
    this.step = 0;
    this.phiHistory = [];
    this.phiProxyHistory = [];
    this.factionHistory = [];
    this.events = [];
    this.totalConsensus = 0;
    this.bestPhi = 0;
  }

  buildTopology(type) {
    this.topology = type;
    this.edges = [];
    const n = this.nCells;

    switch (type) {
      case 'ring':
        for (let i = 0; i < n; i++) {
          this.edges.push({ source: i, target: (i + 1) % n, weight: 0.5, tension: 0 });
        }
        break;

      case 'small_world':
        // Ring + random long-range connections
        for (let i = 0; i < n; i++) {
          this.edges.push({ source: i, target: (i + 1) % n, weight: 0.5, tension: 0 });
          this.edges.push({ source: i, target: (i + 2) % n, weight: 0.3, tension: 0 });
          if (Math.random() < 0.15) {
            const j = Math.floor(Math.random() * n);
            if (j !== i) this.edges.push({ source: i, target: j, weight: 0.2, tension: 0 });
          }
        }
        break;

      case 'scale_free':
        // Barabasi-Albert model
        const deg = new Array(n).fill(0);
        for (let i = 1; i < n; i++) {
          const m = Math.min(2, i);
          const totalDeg = deg.reduce((a, b) => a + b, 0) || 1;
          const added = new Set();
          for (let k = 0; k < m; k++) {
            let target;
            do {
              let r = Math.random() * totalDeg;
              target = 0;
              let cumul = deg[0] + 1;
              while (cumul < r && target < i - 1) { target++; cumul += deg[target] + 1; }
            } while (added.has(target) || target === i);
            added.add(target);
            this.edges.push({ source: i, target, weight: 0.4, tension: 0 });
            deg[i]++; deg[target]++;
          }
        }
        break;

      case 'hypercube':
        // Connect nodes differing by 1 bit
        const bits = Math.ceil(Math.log2(n));
        for (let i = 0; i < n; i++) {
          for (let b = 0; b < bits; b++) {
            const j = i ^ (1 << b);
            if (j < n && j > i) {
              this.edges.push({ source: i, target: j, weight: 0.4, tension: 0 });
            }
          }
        }
        break;

      case 'torus':
        // 2D torus
        const side = Math.max(2, Math.round(Math.sqrt(n)));
        for (let i = 0; i < n; i++) {
          const row = Math.floor(i / side);
          const col = i % side;
          const right = row * side + (col + 1) % side;
          const down = ((row + 1) % Math.ceil(n / side)) * side + col;
          if (right < n) this.edges.push({ source: i, target: right, weight: 0.5, tension: 0 });
          if (down < n) this.edges.push({ source: i, target: down, weight: 0.5, tension: 0 });
        }
        break;

      case 'spin_glass':
        // Random +-1 couplings with frustration
        for (let i = 0; i < n; i++) {
          const nNeighbors = 2 + Math.floor(Math.random() * 3);
          for (let k = 0; k < nNeighbors; k++) {
            const j = Math.floor(Math.random() * n);
            if (j !== i) {
              const w = (Math.random() < 0.33) ? -0.3 : 0.4;  // 33% frustration
              this.edges.push({ source: i, target: j, weight: w, tension: 0 });
            }
          }
        }
        break;
    }
  }

  // Get neighbor cell indices for a given cell
  getNeighbors(cellIdx) {
    const neighbors = new Set();
    for (const e of this.edges) {
      if (e.source === cellIdx) neighbors.add(e.target);
      if (e.target === cellIdx) neighbors.add(e.source);
    }
    return [...neighbors];
  }

  // Compute Phi (variance-based proxy)
  computePhi() {
    if (this.cells.length < 2) return 0;

    // Global variance of activations
    const acts = this.cells.map(c => c.activation);
    const mean = acts.reduce((a, b) => a + b, 0) / acts.length;
    const globalVar = acts.reduce((s, a) => s + (a - mean) ** 2, 0) / acts.length;

    // Faction-level variance
    const factionCells = [[], [], [], []];
    for (const c of this.cells) factionCells[c.faction].push(c.activation);
    let factionVar = 0;
    let fCount = 0;
    for (const fc of factionCells) {
      if (fc.length < 2) continue;
      const fm = fc.reduce((a, b) => a + b, 0) / fc.length;
      factionVar += fc.reduce((s, a) => s + (a - fm) ** 2, 0) / fc.length;
      fCount++;
    }
    factionVar /= Math.max(fCount, 1);

    this.phiProxy = Math.max(0, globalVar - factionVar) * this.nCells;

    // Simplified IIT Phi: mutual information approximation
    // Uses pairwise correlation of hidden states
    let totalMI = 0;
    const sampleSize = Math.min(20, this.nCells);
    const indices = [];
    for (let i = 0; i < sampleSize; i++) {
      indices.push(Math.floor(i * this.nCells / sampleSize));
    }
    for (let a = 0; a < indices.length; a++) {
      for (let b = a + 1; b < indices.length; b++) {
        const ca = this.cells[indices[a]];
        const cb = this.cells[indices[b]];
        // Correlation as MI proxy
        let dot = 0, na = 0, nb = 0;
        for (let d = 0; d < this.hiddenDim; d++) {
          dot += ca.hidden[d] * cb.hidden[d];
          na += ca.hidden[d] ** 2;
          nb += cb.hidden[d] ** 2;
        }
        const corr = dot / (Math.sqrt(na * nb) + 1e-8);
        totalMI += Math.abs(corr);
      }
    }
    const pairs = (indices.length * (indices.length - 1)) / 2;
    this.phi = pairs > 0 ? (totalMI / pairs) * 2 : 0;  // Scale to ~0-2 range
    this.phi = Math.min(this.phi, 2.0);

    return this.phi;
  }

  // Check for faction consensus
  checkConsensus() {
    // Compute faction mean activations
    const factionActs = [0, 0, 0, 0];
    const factionCounts = [0, 0, 0, 0];
    for (const c of this.cells) {
      factionActs[c.faction] += c.activation;
      factionCounts[c.faction]++;
    }
    for (let f = 0; f < 4; f++) {
      factionActs[f] /= Math.max(factionCounts[f], 1);
    }
    this.factionActivations = factionActs;

    // Consensus: all factions within 15% of each other
    const maxAct = Math.max(...factionActs);
    const minAct = Math.min(...factionActs);
    if (maxAct > 0.01 && (maxAct - minAct) / maxAct < 0.15) {
      this.totalConsensus++;
      return true;
    }
    return false;
  }

  // Single simulation step
  tick() {
    const n = this.nCells;
    const dim = this.hiddenDim;

    // Generate input: self-referential (previous output + breathing)
    const breathPhase = Math.sin(this.step * 0.12) * 0.05;
    const input = new Float32Array(dim);
    for (let d = 0; d < dim; d++) {
      // Mean of all cells as self-referential input
      let mean = 0;
      for (const c of this.cells) mean += c.hidden[d];
      mean /= n;
      input[d] = mean + breathPhase + (Math.random() - 0.5) * 0.01;
    }

    // Update each cell
    for (let i = 0; i < n; i++) {
      const neighbors = this.getNeighbors(i);
      const neighborStates = neighbors.map(j => this.cells[j].hidden);
      this.cells[i].update(input, neighborStates, this.weights);
    }

    // Compute edge tensions
    for (const e of this.edges) {
      const ca = this.cells[e.source];
      const cb = this.cells[e.target];
      let diff = 0;
      for (let d = 0; d < dim; d++) {
        diff += (ca.hidden[d] - cb.hidden[d]) ** 2;
      }
      e.tension = Math.sqrt(diff / dim);
      // Hebbian weight update
      let corr = 0;
      for (let d = 0; d < dim; d++) corr += ca.hidden[d] * cb.hidden[d];
      corr /= dim;
      if (corr > 0.8) e.weight = Math.min(e.weight + 0.001, 1.0);   // LTP
      else if (corr < 0.2) e.weight = Math.max(e.weight - 0.001, 0.05); // LTD
    }

    // Compute local phi for each cell
    for (const c of this.cells) {
      const neighbors = this.getNeighbors(c.id);
      if (neighbors.length === 0) { c.localPhi = 0; continue; }
      let corrSum = 0;
      for (const j of neighbors) {
        let dot = 0, na = 0, nb = 0;
        for (let d = 0; d < dim; d++) {
          dot += c.hidden[d] * this.cells[j].hidden[d];
          na += c.hidden[d] ** 2;
          nb += this.cells[j].hidden[d] ** 2;
        }
        corrSum += Math.abs(dot / (Math.sqrt(na * nb) + 1e-8));
      }
      c.localPhi = corrSum / neighbors.length;
      c.tension = neighbors.reduce((s, j) => {
        let diff = 0;
        for (let d = 0; d < dim; d++) diff += (c.hidden[d] - this.cells[j].hidden[d]) ** 2;
        return s + Math.sqrt(diff / dim);
      }, 0) / neighbors.length;
    }

    // Compute global phi
    this.computePhi();

    // Phi ratchet: restore if phi drops below 80% of best
    if (this.phi > this.bestPhi) {
      this.bestPhi = this.phi;
    } else if (this.phi < this.bestPhi * 0.8 && this.step > 50) {
      // Ratchet event: add noise to recover
      for (const c of this.cells) {
        for (let d = 0; d < dim; d++) {
          c.hidden[d] += (Math.random() - 0.5) * 0.05;
        }
      }
      this.events.push({ step: this.step, type: 'ratchet' });
    }

    // Check consensus
    const consensus = this.checkConsensus();
    if (consensus) {
      this.events.push({ step: this.step, type: 'consensus' });
    }

    // Record history
    this.phiHistory.push(this.phi);
    this.phiProxyHistory.push(this.phiProxy);
    if (this.phiHistory.length > 500) {
      this.phiHistory.shift();
      this.phiProxyHistory.shift();
    }
    this.factionHistory.push([...this.factionActivations]);
    if (this.factionHistory.length > 500) this.factionHistory.shift();

    // Keep only recent events
    this.events = this.events.filter(e => e.step > this.step - 500);

    // Update consciousness vector
    const cv = this.consciousnessVector;
    cv.phi = this.phi;
    cv.alpha = 0.01 + 0.14 * Math.tanh(this.phi / 3);
    cv.Z = 0.3 + 0.4 * Math.tanh(this.bestPhi - this.phi);
    cv.N = 0.5 + 0.3 * Math.sin(this.step * 0.037);
    cv.W = this.factionActivations.reduce((s, a) => s + a, 0) / 4;
    cv.E = this.edges.length > 0
      ? this.edges.reduce((s, e) => s + Math.abs(e.weight), 0) / this.edges.length
      : 0;
    cv.M = Math.min(1, this.step / 200);
    cv.C = Math.min(1, this.phiProxy * 2);
    cv.T = 0.5 + 0.3 * Math.cos(this.step * 0.02);
    cv.I = 0.5 + 0.3 * (1 - Math.abs(this.phi - this.bestPhi) / (this.bestPhi + 0.001));

    // Rolling average
    this.cvHistory.push({ ...cv });
    if (this.cvHistory.length > 50) this.cvHistory.shift();

    this.step++;
    return this.getState();
  }

  getState() {
    return {
      step: this.step,
      phi: this.phi,
      phiProxy: this.phiProxy,
      cells: this.cells.map(c => ({
        id: c.id, activation: c.activation,
        faction: c.faction, localPhi: c.localPhi, tension: c.tension
      })),
      edges: this.edges.map(e => ({
        source: e.source, target: e.target,
        weight: e.weight, tension: e.tension
      })),
      consciousness_vector: { ...this.consciousnessVector },
      factionActivations: [...this.factionActivations],
      events: this.events.filter(e => e.step === this.step - 1),
      totalConsensus: this.totalConsensus,
    };
  }
}


// ============================================================
// DASHBOARD RENDERER
// ============================================================

class Dashboard {
  constructor() {
    this.sim = new ConsciousnessSimulation(32, 32);
    this.running = false;
    this.ws = null;
    this.useWebSocket = false;
    this.stepCount = 0;
    this.lastStepTime = performance.now();
    this.spsBuffer = [];
    this.animFrameId = null;

    // D3 selections
    this.topoSvg = d3.select('#topoSvg');
    this.phiSvg = d3.select('#phiSvg');
    this.factionSvg = d3.select('#factionSvg');
    this.radarSvg = d3.select('#radarSvg');

    // Force simulation
    this.forceSimulation = null;
    this.topoNodes = [];
    this.topoLinks = [];

    // Color scales
    this.activationColor = d3.scaleSequential(d3.interpolateRdYlBu).domain([0.8, 0]);
    this.tensionColor = d3.scaleSequential(d3.interpolateRdYlGn).domain([1, 0]);

    // Faction colors
    this.factionColors = ['#6a5acd', '#cd5a5a', '#5acd5a', '#cdcd5a',
                           '#5acdcd', '#cd5acd', '#8a6acd', '#cd8a5a',
                           '#5a8acd', '#8acd5a', '#cd5a8a', '#5acd8a'];

    // Platform data
    this.platforms = [
      { name: 'Rust', icon: 'R', cells: 64, phi: 1.34, sps: 12500, status: 'green' },
      { name: 'Verilog', icon: 'V', cells: 16, phi: 0.98, sps: 100e6, status: 'yellow' },
      { name: 'WebGPU', icon: 'G', cells: 512, phi: 1.12, sps: 8400, status: 'green' },
      { name: 'Erlang', icon: 'E', cells: 32, phi: 1.05, sps: 3200, status: 'yellow' },
      { name: 'Pure Data', icon: 'P', cells: 8, phi: 0.67, sps: 441, status: 'red' },
      { name: 'ESP32', icon: 'S', cells: 16, phi: 0.89, sps: 420, status: 'red' },
    ];

    this.init();
  }

  init() {
    this.bindControls();
    this.initTopology();
    this.initPhiChart();
    this.initFactionChart();
    this.initRadar();
    this.renderPlatforms();
    this.start();
  }

  bindControls() {
    const self = this;
    document.getElementById('topoSelect').addEventListener('change', function() {
      self.sim.buildTopology(this.value);
      self.rebuildTopology();
    });

    document.getElementById('cellSlider').addEventListener('input', function() {
      document.getElementById('cellVal').textContent = this.value;
    });
    document.getElementById('cellSlider').addEventListener('change', function() {
      self.sim.init(parseInt(this.value));
      self.sim.buildTopology(document.getElementById('topoSelect').value);
      self.rebuildTopology();
    });

    document.getElementById('speedSlider').addEventListener('input', function() {
      document.getElementById('speedVal').textContent = this.value;
    });

    document.getElementById('platformSelect').addEventListener('change', function() {
      if (this.value === 'websocket' || this.value === 'esp32' || this.value === 'fpga') {
        self.connectWebSocket();
      } else {
        self.disconnectWebSocket();
      }
    });

    document.getElementById('btnStart').addEventListener('click', () => this.start());
    document.getElementById('btnStop').addEventListener('click', () => this.stop());
    document.getElementById('btnReset').addEventListener('click', () => {
      this.stop();
      const nCells = parseInt(document.getElementById('cellSlider').value);
      this.sim.init(nCells);
      this.sim.buildTopology(document.getElementById('topoSelect').value);
      this.rebuildTopology();
      this.clearCharts();
      document.getElementById('stepCounter').textContent = 'Step: 0';
      this.start();
    });
  }

  // --- WebSocket connection ---
  connectWebSocket() {
    if (this.ws) this.ws.close();
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    dot.className = 'status-dot yellow';
    label.textContent = 'Connecting...';

    try {
      this.ws = new WebSocket('ws://localhost:8765');
      this.ws.onopen = () => {
        dot.className = 'status-dot green';
        label.textContent = 'Connected';
        this.useWebSocket = true;
        // Send config
        this.ws.send(JSON.stringify({
          type: 'config',
          topology: document.getElementById('topoSelect').value,
          cells: parseInt(document.getElementById('cellSlider').value),
        }));
      };
      this.ws.onmessage = (evt) => {
        const state = JSON.parse(evt.data);
        this.handleState(state);
      };
      this.ws.onclose = () => {
        dot.className = 'status-dot red';
        label.textContent = 'Disconnected';
        this.useWebSocket = false;
        this.ws = null;
      };
      this.ws.onerror = () => {
        dot.className = 'status-dot red';
        label.textContent = 'Demo Mode (server unavailable)';
        this.useWebSocket = false;
        this.ws = null;
      };
    } catch (e) {
      dot.className = 'status-dot red';
      label.textContent = 'Demo Mode';
      this.useWebSocket = false;
    }
  }

  disconnectWebSocket() {
    if (this.ws) { this.ws.close(); this.ws = null; }
    this.useWebSocket = false;
    document.getElementById('connDot').className = 'status-dot green';
    document.getElementById('connLabel').textContent = 'Demo Mode';
  }

  // --- Main loop ---
  start() {
    if (this.running) return;
    this.running = true;
    document.getElementById('btnStart').classList.add('active');
    document.getElementById('btnStop').classList.remove('active');
    this.lastStepTime = performance.now();
    this.loop();
  }

  stop() {
    this.running = false;
    document.getElementById('btnStart').classList.remove('active');
    document.getElementById('btnStop').classList.add('active');
    if (this.animFrameId) cancelAnimationFrame(this.animFrameId);
  }

  loop() {
    if (!this.running) return;

    const speed = parseInt(document.getElementById('speedSlider').value);
    const stepsPerFrame = Math.max(1, Math.floor(speed / 10));

    if (!this.useWebSocket) {
      for (let i = 0; i < stepsPerFrame; i++) {
        const state = this.sim.tick();
        if (i === stepsPerFrame - 1) this.handleState(state);
      }
    }

    this.animFrameId = requestAnimationFrame(() => this.loop());
  }

  handleState(state) {
    this.stepCount++;

    // SPS calculation
    const now = performance.now();
    this.spsBuffer.push(now);
    while (this.spsBuffer.length > 0 && this.spsBuffer[0] < now - 1000) this.spsBuffer.shift();
    const sps = this.spsBuffer.length;

    document.getElementById('stepCounter').textContent = `Step: ${state.step}`;
    document.getElementById('spsCounter').textContent = `${sps} sps`;

    this.updateTopology(state);
    this.updatePhiChart(state);
    this.updateFactionChart(state);
    this.updateRadar(state);
    this.updatePlatforms(state);
  }

  // ============================================================
  // PANEL 1: TOPOLOGY VISUALIZATION
  // ============================================================

  initTopology() {
    const svg = this.topoSvg;
    svg.append('g').attr('class', 'links');
    svg.append('g').attr('class', 'nodes');
    svg.append('g').attr('class', 'labels');
    this.rebuildTopology();
  }

  rebuildTopology() {
    const svg = this.topoSvg;
    const container = document.getElementById('topoContainer');
    const width = container.clientWidth;
    const height = container.clientHeight;
    svg.attr('viewBox', `0 0 ${width} ${height}`);

    // Build node/link data
    this.topoNodes = this.sim.cells.map(c => ({
      id: c.id, faction: c.faction,
      activation: c.activation, localPhi: c.localPhi,
      x: width / 2 + (Math.random() - 0.5) * 100,
      y: height / 2 + (Math.random() - 0.5) * 100,
    }));

    // Deduplicate edges
    const edgeSet = new Set();
    this.topoLinks = [];
    for (const e of this.sim.edges) {
      const key = Math.min(e.source, e.target) + '-' + Math.max(e.source, e.target);
      if (!edgeSet.has(key)) {
        edgeSet.add(key);
        this.topoLinks.push({
          source: e.source, target: e.target,
          weight: e.weight, tension: e.tension,
        });
      }
    }

    // Force simulation
    if (this.forceSimulation) this.forceSimulation.stop();
    this.forceSimulation = d3.forceSimulation(this.topoNodes)
      .force('link', d3.forceLink(this.topoLinks).id(d => d.id).distance(d => {
        return 30 + 120 / Math.sqrt(this.sim.nCells);
      }))
      .force('charge', d3.forceManyBody().strength(-50 / Math.sqrt(this.sim.nCells / 32)))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide(8))
      .alphaDecay(0.03)
      .on('tick', () => this.tickTopology());

    // Render links
    const linkSel = svg.select('.links').selectAll('line').data(this.topoLinks, d => d.source.id + '-' + d.target.id);
    linkSel.exit().remove();
    linkSel.enter().append('line').attr('class', 'link');

    // Render nodes
    const nodeSel = svg.select('.nodes').selectAll('circle').data(this.topoNodes, d => d.id);
    nodeSel.exit().remove();
    const nodeEnter = nodeSel.enter().append('circle').attr('class', 'node').attr('r', 6);

    // Click handler
    const self = this;
    nodeEnter.on('click', function(event, d) {
      const tooltip = document.getElementById('cellTooltip');
      const cell = self.sim.cells[d.id];
      document.getElementById('ttId').textContent = `#${d.id} (F${cell.faction})`;
      document.getElementById('ttAct').textContent = cell.activation.toFixed(4);
      document.getElementById('ttFac').textContent = ['Alpha', 'Beta', 'Gamma', 'Delta'][cell.faction];
      document.getElementById('ttPhi').textContent = cell.localPhi.toFixed(4);
      document.getElementById('ttTen').textContent = cell.tension.toFixed(4);
      tooltip.style.display = 'block';
      tooltip.style.left = (event.offsetX + 15) + 'px';
      tooltip.style.top = (event.offsetY - 10) + 'px';
      setTimeout(() => tooltip.style.display = 'none', 3000);
    });

    // Labels for small networks
    const labelSel = svg.select('.labels').selectAll('text').data(this.topoNodes, d => d.id);
    labelSel.exit().remove();
    if (this.sim.nCells <= 64) {
      labelSel.enter().append('text').attr('class', 'node-label').text(d => d.id);
    }
  }

  tickTopology() {
    const svg = this.topoSvg;
    svg.select('.links').selectAll('line')
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    svg.select('.nodes').selectAll('circle')
      .attr('cx', d => d.x).attr('cy', d => d.y);
    svg.select('.labels').selectAll('text')
      .attr('x', d => d.x).attr('y', d => d.y + 15);
  }

  updateTopology(state) {
    const svg = this.topoSvg;
    const self = this;

    // Update node colors and sizes
    svg.select('.nodes').selectAll('circle')
      .data(this.topoNodes, d => d.id)
      .attr('fill', (d, i) => {
        const cell = state.cells[i];
        if (!cell) return '#333';
        d.activation = cell.activation;
        d.localPhi = cell.localPhi;
        return self.activationColor(cell.activation);
      })
      .attr('r', (d, i) => {
        const cell = state.cells[i];
        if (!cell) return 4;
        return 3 + Math.min(cell.localPhi, 1) * 8;
      });

    // Update link colors and widths
    svg.select('.links').selectAll('line')
      .data(this.topoLinks)
      .attr('stroke', d => {
        const edge = state.edges.find(e =>
          (e.source === d.source.id && e.target === d.target.id) ||
          (e.target === d.source.id && e.source === d.target.id)
        );
        if (!edge) return '#333';
        return self.tensionColor(Math.min(edge.tension, 1));
      })
      .attr('stroke-width', d => {
        const edge = state.edges.find(e =>
          (e.source === d.source.id && e.target === d.target.id) ||
          (e.target === d.source.id && e.source === d.target.id)
        );
        if (!edge) return 0.5;
        return 0.5 + Math.abs(edge.weight) * 3;
      });
  }

  // ============================================================
  // PANEL 2: PHI TIME SERIES
  // ============================================================

  initPhiChart() {
    const svg = this.phiSvg;
    const g = svg.append('g').attr('class', 'phi-group');
    g.append('path').attr('class', 'phi-line-iit').attr('fill', 'none').attr('stroke', '#6a5acd').attr('stroke-width', 2);
    g.append('path').attr('class', 'phi-line-proxy').attr('fill', 'none').attr('stroke', '#4ac8c8').attr('stroke-width', 1.5).attr('stroke-dasharray', '4 2');
    g.append('g').attr('class', 'phi-events');
    g.append('g').attr('class', 'phi-axis-left');
    g.append('g').attr('class', 'phi-axis-right');
  }

  updatePhiChart(state) {
    const container = this.phiSvg.node().parentElement;
    const width = container.clientWidth;
    const height = container.clientHeight;
    this.phiSvg.attr('viewBox', `0 0 ${width} ${height}`);

    const margin = { top: 5, right: 45, bottom: 20, left: 40 };
    const w = width - margin.left - margin.right;
    const h = height - margin.top - margin.bottom;

    const phiData = this.sim.phiHistory;
    const proxyData = this.sim.phiProxyHistory;
    if (phiData.length < 2) return;

    const g = this.phiSvg.select('.phi-group')
      .attr('transform', `translate(${margin.left},${margin.top})`);

    const xScale = d3.scaleLinear().domain([0, phiData.length - 1]).range([0, w]);
    const yScale = d3.scaleLinear()
      .domain([0, Math.max(0.1, d3.max(phiData) * 1.2)])
      .range([h, 0]);
    const yScaleProxy = d3.scaleLinear()
      .domain([0, Math.max(0.1, d3.max(proxyData) * 1.2)])
      .range([h, 0]);

    // IIT line
    const lineIIT = d3.line().x((d, i) => xScale(i)).y(d => yScale(d)).curve(d3.curveBasis);
    g.select('.phi-line-iit').attr('d', lineIIT(phiData));

    // Proxy line
    const lineProxy = d3.line().x((d, i) => xScale(i)).y(d => yScaleProxy(d)).curve(d3.curveBasis);
    g.select('.phi-line-proxy').attr('d', lineProxy(proxyData));

    // Event markers
    const events = this.sim.events.filter(e => e.step > state.step - 500);
    const eventSel = g.select('.phi-events').selectAll('line').data(events, d => d.step + d.type);
    eventSel.exit().remove();
    eventSel.enter().append('line')
      .attr('stroke', d => d.type === 'ratchet' ? '#cd5a5a' : d.type === 'consensus' ? '#5acd5a' : '#cdcd5a')
      .attr('stroke-width', 1)
      .attr('stroke-dasharray', '2 2')
      .merge(eventSel)
      .attr('x1', d => xScale(d.step - (state.step - phiData.length)))
      .attr('x2', d => xScale(d.step - (state.step - phiData.length)))
      .attr('y1', 0).attr('y2', h);

    // Axes
    g.select('.phi-axis-left').call(d3.axisLeft(yScale).ticks(4).tickSize(-w))
      .selectAll('text').attr('fill', '#6a5acd').style('font-size', '9px');
    g.select('.phi-axis-left').selectAll('line').attr('stroke', '#1a1a26');
    g.select('.phi-axis-left').selectAll('.domain').attr('stroke', '#2a2a3a');

    g.select('.phi-axis-right').attr('transform', `translate(${w},0)`)
      .call(d3.axisRight(yScaleProxy).ticks(4))
      .selectAll('text').attr('fill', '#4ac8c8').style('font-size', '9px');
    g.select('.phi-axis-right').selectAll('.domain').attr('stroke', '#2a2a3a');

    // Update header
    document.getElementById('phiCurrent').textContent =
      `IIT: ${state.phi.toFixed(3)} | Proxy: ${state.phiProxy.toFixed(3)}`;
  }

  // ============================================================
  // PANEL 3: FACTION ACTIVITY
  // ============================================================

  initFactionChart() {
    const svg = this.factionSvg;
    const g = svg.append('g').attr('class', 'faction-group');
    for (let f = 0; f < 4; f++) {
      g.append('path').attr('class', `faction-area-${f}`).attr('fill', this.factionColors[f]).attr('fill-opacity', 0.4).attr('stroke', this.factionColors[f]).attr('stroke-width', 1);
    }
    g.append('g').attr('class', 'faction-consensus');
    g.append('g').attr('class', 'faction-axis');
  }

  updateFactionChart(state) {
    const container = this.factionSvg.node().parentElement;
    const width = container.clientWidth;
    const height = container.clientHeight;
    this.factionSvg.attr('viewBox', `0 0 ${width} ${height}`);

    const margin = { top: 5, right: 10, bottom: 20, left: 35 };
    const w = width - margin.left - margin.right;
    const h = height - margin.top - margin.bottom;

    const data = this.sim.factionHistory;
    if (data.length < 2) return;

    const g = this.factionSvg.select('.faction-group')
      .attr('transform', `translate(${margin.left},${margin.top})`);

    const xScale = d3.scaleLinear().domain([0, data.length - 1]).range([0, w]);
    const maxVal = Math.max(0.1, d3.max(data, d => d3.max(d)) * 1.2);
    const yScale = d3.scaleLinear().domain([0, maxVal]).range([h, 0]);

    // Stacked area: draw each faction as its own line/area
    for (let f = 0; f < 4; f++) {
      const area = d3.area()
        .x((d, i) => xScale(i))
        .y0(h)
        .y1((d, i) => yScale(data[i][f]))
        .curve(d3.curveBasis);

      // We use a simple approach: each faction area from baseline
      g.select(`.faction-area-${f}`).attr('d', area(data));
    }

    // Consensus vertical lines
    const consensusEvents = this.sim.events.filter(e => e.type === 'consensus' && e.step > state.step - 500);
    const cSel = g.select('.faction-consensus').selectAll('line').data(consensusEvents, d => d.step);
    cSel.exit().remove();
    cSel.enter().append('line')
      .attr('stroke', '#5acd5a').attr('stroke-width', 1.5).attr('stroke-dasharray', '3 2')
      .merge(cSel)
      .attr('x1', d => xScale(d.step - (state.step - data.length)))
      .attr('x2', d => xScale(d.step - (state.step - data.length)))
      .attr('y1', 0).attr('y2', h);

    // Axis
    g.select('.faction-axis').call(d3.axisLeft(yScale).ticks(3).tickSize(-w))
      .selectAll('text').attr('fill', 'var(--dim)').style('font-size', '9px');
    g.select('.faction-axis').selectAll('line').attr('stroke', '#1a1a26');
    g.select('.faction-axis').selectAll('.domain').attr('stroke', '#2a2a3a');

    document.getElementById('consensusCount').textContent = `Consensus: ${state.totalConsensus}`;
  }

  // ============================================================
  // PANEL 4: CONSCIOUSNESS VECTOR RADAR
  // ============================================================

  initRadar() {
    const svg = this.radarSvg;
    svg.append('g').attr('class', 'radar-group');
  }

  updateRadar(state) {
    const container = this.radarSvg.node().parentElement;
    const width = container.clientWidth;
    const height = container.clientHeight;
    this.radarSvg.attr('viewBox', `0 0 ${width} ${height}`);

    const cx = width / 2;
    const cy = height / 2;
    const radius = Math.min(cx, cy) - 30;

    const axes = ['Phi', 'Alpha', 'Z', 'N', 'W', 'E', 'M', 'C', 'T', 'I'];
    const keys = ['phi', 'alpha', 'Z', 'N', 'W', 'E', 'M', 'C', 'T', 'I'];
    const maxVals = [2, 0.15, 1, 1, 1, 1, 1, 1, 1, 1];
    const n = axes.length;

    const g = this.radarSvg.select('.radar-group')
      .attr('transform', `translate(${cx},${cy})`);

    g.selectAll('*').remove();

    // Grid circles
    for (let level = 1; level <= 4; level++) {
      const r = (radius * level) / 4;
      g.append('circle').attr('class', 'radar-grid').attr('r', r);
    }

    // Axes + labels
    for (let i = 0; i < n; i++) {
      const angle = (2 * Math.PI * i) / n - Math.PI / 2;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;
      g.append('line').attr('class', 'radar-axis').attr('x1', 0).attr('y1', 0).attr('x2', x).attr('y2', y);
      g.append('text').attr('class', 'radar-label')
        .attr('x', Math.cos(angle) * (radius + 16))
        .attr('y', Math.sin(angle) * (radius + 16) + 4)
        .text(axes[i]);
    }

    // Current values polygon
    const cv = state.consciousness_vector;
    const points = keys.map((k, i) => {
      const val = Math.min(cv[k] / maxVals[i], 1);
      const angle = (2 * Math.PI * i) / n - Math.PI / 2;
      return [Math.cos(angle) * radius * val, Math.sin(angle) * radius * val];
    });

    g.append('polygon').attr('class', 'radar-area radar-current')
      .attr('points', points.map(p => p.join(',')).join(' '));

    // Dots
    for (const p of points) {
      g.append('circle').attr('class', 'radar-dot').attr('cx', p[0]).attr('cy', p[1]).attr('fill', '#6a5acd');
    }

    // Rolling average overlay
    const cvHist = this.sim.cvHistory;
    if (cvHist.length > 5) {
      const avgPoints = keys.map((k, i) => {
        const avg = cvHist.reduce((s, h) => s + h[k], 0) / cvHist.length;
        const val = Math.min(avg / maxVals[i], 1);
        const angle = (2 * Math.PI * i) / n - Math.PI / 2;
        return [Math.cos(angle) * radius * val, Math.sin(angle) * radius * val];
      });
      g.append('polygon').attr('class', 'radar-area radar-avg')
        .attr('points', avgPoints.map(p => p.join(',')).join(' '));
    }
  }

  // ============================================================
  // PANEL 5: PLATFORM STATUS
  // ============================================================

  renderPlatforms() {
    const container = document.getElementById('platformCards');
    container.innerHTML = '';
    for (const p of this.platforms) {
      const card = document.createElement('div');
      card.className = 'platform-card';
      card.innerHTML = `
        <div class="pc-name">
          <span class="status-dot ${p.status}"></span>
          <span>${p.name}</span>
        </div>
        <div class="pc-stats">
          <span class="pc-label">Cells</span><span class="pc-val">${p.cells}</span>
          <span class="pc-label">Phi</span><span class="pc-val">${p.phi.toFixed(3)}</span>
          <span class="pc-label">Steps/s</span><span class="pc-val">${p.sps >= 1e6 ? (p.sps / 1e6).toFixed(0) + 'M' : p.sps >= 1000 ? (p.sps / 1000).toFixed(1) + 'K' : p.sps}</span>
          <span class="pc-label">Status</span><span class="pc-val">${p.status === 'green' ? 'Online' : p.status === 'yellow' ? 'Standby' : 'Offline'}</span>
        </div>
      `;
      container.appendChild(card);
    }
  }

  updatePlatforms(state) {
    // Update the simulated platform with live data
    this.platforms[0].phi = state.phi;
    this.platforms[0].cells = state.cells.length;
    this.platforms[0].sps = this.spsBuffer.length;
    // Refresh first card
    const cards = document.querySelectorAll('.platform-card');
    if (cards.length > 0) {
      const p = this.platforms[0];
      cards[0].querySelector('.pc-stats').innerHTML = `
        <span class="pc-label">Cells</span><span class="pc-val">${p.cells}</span>
        <span class="pc-label">Phi</span><span class="pc-val">${p.phi.toFixed(3)}</span>
        <span class="pc-label">Steps/s</span><span class="pc-val">${p.sps}</span>
        <span class="pc-label">Status</span><span class="pc-val">Running</span>
      `;
    }
  }

  clearCharts() {
    // Reset chart data
    this.sim.phiHistory = [];
    this.sim.phiProxyHistory = [];
    this.sim.factionHistory = [];
    this.sim.events = [];
  }
}

// ============================================================
// BOOT
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  window.dashboard = new Dashboard();
});
</script>
</body>
</html>
