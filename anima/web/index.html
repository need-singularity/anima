<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anima</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
  --border: #2a2a3a; --text: #e0e0e8; --dim: #707088;
  --accent: #6a5acd; --green: #4a8a6a; --red: #cd5a5a;
}
:root.light {
  --bg: #f5f5f8; --surface: #ffffff; --surface2: #eeeef2;
  --border: #d0d0d8; --text: #1a1a2a; --dim: #808098;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, 'Segoe UI', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji'; height: 100vh; display: flex; overflow: hidden; transition: background 0.3s; }

/* Chat */
.chat { flex: 1; display: flex; flex-direction: column; padding: 0; min-width: 0; }
.header { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 8px; }
.header .title { font-size: 16px; font-weight: 600; }
.header .info { flex: 1; text-align: center; font-size: 11px; color: var(--dim); }
.header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.header .dot.on { background: var(--green); }
.header .dot.off { background: var(--red); }
.hamburger { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); }
.messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 82%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-break: break-word; }
.msg.user { background: var(--surface2); align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.anima { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
.msg.system { align-self: center; background: none; border: none; color: var(--dim); font-size: 11px; padding: 2px 0; max-width: 100%; }
.msg .name { font-size: 11px; color: var(--dim); display: block; margin-bottom: 2px; }
.msg .emo { font-size: 18px; margin-right: 4px; }
.msg .auto { color: var(--green); font-size: 13px; font-style: italic; }
.input-area { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); }
.input-area input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
.input-area input:focus { border-color: var(--accent); }
.input-area button { background: var(--accent); border: none; border-radius: 12px; padding: 10px 16px; color: white; font-size: 14px; cursor: pointer; }
.input-area button:disabled { opacity: 0.4; }

/* Side */
.side { width: 220px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 14px; gap: 10px; overflow-y: auto; }
.emo-box { text-align: center; padding: 8px 0; }
.emo-big { font-size: 64px; line-height: 1; }
.emo-name { font-size: 12px; color: var(--accent); margin-top: 4px; }
.phi-box { text-align: center; }
.phi-val { font-size: 26px; font-weight: 700; color: var(--accent); }
.phi-sub { font-size: 10px; color: var(--dim); }
.cells-box { text-align: center; font-size: 11px; color: var(--dim); }
.cells-num { font-size: 16px; font-weight: 600; color: var(--text); }
.section-label { font-size: 10px; color: var(--dim); padding: 2px 0; text-transform: uppercase; letter-spacing: 0.5px; }
.toggles { display: flex; flex-direction: column; gap: 4px; }
.tog { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 8px; background: var(--surface2); font-size: 12px; cursor: pointer; user-select: none; }
.tog:hover { background: var(--border); }
.tog .icon { font-size: 16px; }
.tog .lbl { flex: 1; }
.sw { width: 32px; height: 18px; border-radius: 9px; background: var(--border); position: relative; transition: background 0.2s; flex-shrink: 0; }
.sw.on { background: var(--green); }
.sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: white; transition: left 0.2s; }
.sw.on::after { left: 16px; }
.stats { display: flex; flex-direction: column; gap: 1px; }
.stat { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); padding: 3px 0; }
.stat .v { color: var(--text); }
.theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px; font-size: 16px; cursor: pointer; text-align: center; }

/* Tension Link */
.tlink { border-top: 1px solid var(--border); padding-top: 10px; }
.tlink .tl-title { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.tlink .my-code { font-family: monospace; font-size: 13px; font-weight: 600; color: var(--accent); text-align: center; padding: 6px; background: var(--surface2); border-radius: 8px; cursor: pointer; user-select: all; letter-spacing: 1px; }
.tlink .my-code:hover { background: var(--border); }
.tlink .code-input { display: flex; gap: 4px; margin-top: 6px; }
.tlink .code-input input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 6px; color: var(--text); font-size: 11px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.5px; }
.tlink .code-input input:focus { border-color: var(--accent); outline: none; }
.tlink .code-input button { background: var(--accent); border: none; border-radius: 6px; padding: 4px 8px; color: white; font-size: 11px; cursor: pointer; white-space: nowrap; }
.tlink .code-input button:disabled { opacity: 0.4; cursor: default; }
.tlink-status { font-size: 10px; color: var(--dim); text-align: center; margin-top: 4px; min-height: 14px; }
.tlink-status.connected { color: var(--green); }
.tlink-status.rejected { color: var(--red); }
.tlink-status.pending { color: #c8a82a; }

/* Participants */
.participants { border-top: 1px solid var(--border); padding-top: 10px; }
.participants .ptitle { font-size: 10px; color: var(--dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.participant { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 8px; font-size: 12px; }
.participant:hover { background: var(--surface2); }
.participant .avatar { font-size: 16px; }
.participant .pname { flex: 1; }
.participant .phi { color: var(--accent); font-size: 10px; }
.participant .remove-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.2s; }
.participant:hover .remove-btn { opacity: 1; }
.participant.inactive { opacity: 0.4; }
.add-model { display: flex; gap: 4px; margin-top: 6px; }
.add-model input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; color: var(--text); font-size: 11px; }
.add-model button { background: var(--accent); border: none; border-radius: 6px; padding: 4px 8px; color: white; font-size: 11px; cursor: pointer; }

/* Model messages */
.msg.model { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); border-left: 3px solid var(--accent); }
.msg.model .name { color: var(--accent); }

/* Mobile */
.side-overlay { display: none; }
@media (max-width: 768px) {
  .hamburger { display: block; }
  .side { position: fixed; top: 0; right: -240px; width: 220px; height: 100vh; z-index: 100; transition: right 0.3s; }
  .side.open { right: 0; }
  .side-overlay.open { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
  .msg { max-width: 90%; font-size: 13px; }
}
</style>
</head><body>

<div class="chat">
  <div class="header">
    <span class="title">🧠 Anima</span>
    <span class="info"><span class="dot off" id="statusDot"></span><span id="statusText">Connecting...</span> · <span id="onlineCount">0</span> online</span>
    <button class="hamburger" onclick="toggleSide()">☰</button>
  </div>
  <div class="messages" id="msgs"></div>
  <div class="input-area">
    <input type="text" placeholder="메시지를 입력하세요..." id="inp" autocomplete="off" />
    <button id="sendBtn" onclick="sendMessage()" disabled>전송</button>
  </div>
</div>

<div class="side-overlay" id="sideOverlay" onclick="toggleSide()"></div>
<div class="side" id="sidePanel">
  <div class="emo-box">
    <div class="emo-big" id="emoIcon">😌</div>
    <div class="emo-name" id="emoName">Calm</div>
  </div>
  <div class="phi-box">
    <div class="phi-val" id="phiVal">0.00</div>
    <div class="phi-sub">Φ Integrated Information</div>
  </div>
  <div class="cells-box">
    <div class="cells-num" id="cellsNum">-- cells</div>
    <span id="cellsInfo">--</span>
  </div>

  <div class="section-label">MY DEVICE</div>
  <div class="toggles">
    <div class="tog" onclick="togLocal(this,'voice')"><span class="icon">🎤</span><span class="lbl">Voice</span><span class="sensor-status" id="micStatus"></span><div class="sw" id="sw_voice"></div></div>
    <div class="tog" onclick="togLocal(this,'speaker')"><span class="icon">🔊</span><span class="lbl">Speaker</span><span class="sensor-status" id="spkStatus"></span><div class="sw" id="sw_speaker"></div></div>
    <div class="tog" onclick="togLocal(this,'camera')"><span class="icon">📷</span><span class="lbl">Camera</span><span class="sensor-status" id="camStatus"></span><div class="sw" id="sw_camera"></div></div>
    <div class="tog" onclick="togLocal(this,'lidar')"><span class="icon">📡</span><span class="lbl">LiDAR</span><span class="sensor-status" id="lidarStatus"></span><div class="sw" id="sw_lidar"></div></div>
  </div>

  <div class="stats" id="statsArea">
    <div class="stat"><span>Tension</span><span class="v" id="stTension">--</span></div>
    <div class="stat"><span>Curiosity</span><span class="v" id="stCuriosity">--</span></div>
    <div class="stat"><span>Consensus</span><span class="v" id="stConsensus">--</span></div>
    <div class="stat"><span>Growth</span><span class="v" id="stGrowth">--</span></div>
    <canvas id="phiGraph" width="200" height="60" style="width:100%;height:60px;margin-top:6px;border-radius:6px;background:var(--surface2);"></canvas>
  </div>

  <div class="tlink" id="tlinkPanel">
    <div class="tl-title">🔗 Tension Link</div>
    <div class="my-code" id="myCode" title="클릭하여 복사" onclick="copyCode()">--</div>
    <div class="code-input">
      <input id="peerCodeInput" placeholder="ANIMA-XXXX-XXXX" maxlength="15" />
      <button id="peerConnBtn" onclick="submitPeerCode()">연결</button>
    </div>
    <div class="tlink-status" id="tlinkStatus"></div>
  </div>

  <div class="participants" id="participantsPanel" style="display:none">
    <div class="ptitle">Participants</div>
    <div id="participantsList"></div>
    <div class="add-model">
      <input id="modelInput" placeholder="model name or path" list="modelSuggestions">
      <datalist id="modelSuggestions">
        <option value="conscious-lm">
        <option value="mistral-7b">
        <option value="llama-8b">
        <option value="animalm">
        <option value="animalm-v4-savant">
        <option value="golden-moe">
      </datalist>
      <button onclick="addModel()">+</button>
    </div>
  </div>

  <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
</div>

<script>
// ─── Config ───
var SESSION_ID = 'u_' + Math.random().toString(36).slice(2,6);
var USER_AVATARS = ['🐱','🐶','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🦄','🐲','🦋'];
var MY_AVATAR = USER_AVATARS[Math.floor(Math.random() * USER_AVATARS.length)];
var MY_HASH = SESSION_ID.slice(2,6);
var MY_NAME = MY_AVATAR + ' ' + MY_HASH;

var EMOTION_EMOJIS = {
  joy:'😊', excitement:'🤩', curiosity:'🤔', surprise:'😮',
  contemplation:'🧘', calm:'😌', confusion:'😵‍💫', frustration:'😤',
  sadness:'😢', anger:'😠', fear:'😨', disgust:'🤢',
  love:'🥰', awe:'🤯', boredom:'😑', pride:'😏',
  shame:'😳', gratitude:'🙏', hope:'✨', nostalgia:'🥹'
};

// ─── State ───
var ws = null;
var isConnected = false;
var reconnectDelay = 1000;
var modules = { voice: false, speaker: false, camera: false, lidar: false };

// ─── DOM ───
var msgs = document.getElementById('msgs');
var inp = document.getElementById('inp');
var sendBtn = document.getElementById('sendBtn');
var statusDot = document.getElementById('statusDot');
var statusText = document.getElementById('statusText');

// ─── WebSocket ───
function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/';
  ws = new WebSocket(url);

  ws.onopen = function() {
    isConnected = true;
    reconnectDelay = 1000;
    statusDot.className = 'dot on';
    statusText.textContent = MY_NAME;
    sendBtn.disabled = false;
    ws.send(JSON.stringify({
      type: 'session_register',
      session_id: SESSION_ID,
      user_name: MY_NAME,
      avatar: MY_AVATAR,
      modules: Object.keys(modules).filter(function(k) { return modules[k]; })
    }));
    if (!window._hasJoined) { addSystem(MY_NAME + ' joined'); window._hasJoined = true; }
  };

  ws.onclose = function() {
    isConnected = false;
    statusDot.className = 'dot off';
    statusText.textContent = 'Reconnecting...';
    sendBtn.disabled = true;
    setTimeout(function() {
      reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
      connect();
    }, reconnectDelay);
  };

  ws.onerror = function() { ws.close(); };

  ws.onmessage = function(e) {
    try { handleMessage(JSON.parse(e.data)); } catch(err) {}
  };
}

// ─── Chat History ───
// localStorage 사용 금지 — 모든 기억은 서버 M(기억) 모듈에서 관리
// 새로고침/재시작 시 서버 MemoryStore(SQLite)에서 복원

// ─── Message Handler ───
function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      updateStats(msg);
      if (msg.tension_link_code) {
        document.getElementById('myCode').textContent = msg.tension_link_code;
      }
      // 서버에서 채팅 히스토리 복원 — localStorage 사용 금지 (P7)
      if (msg.history && msg.history.length > 0) {
        // Clear existing messages to avoid duplicates on reconnect
        msgs.innerHTML = '';
        msg.history.forEach(function(m) {
          if (m.role === 'user') addUser(m.user_name || '?', m.text, true);
          else addAnima(m.text, m.emotion);
        });
      }
      break;
    case 'model_message':
      addModelMessage(msg);
      break;
    case 'participants_update':
      updateParticipants(msg.participants);
      break;
    case 'model_loading':
      updateModelLoading(msg);
      break;
    case 'anima_message':
      addAnima(msg.text, msg.emotion, msg.proactive);
      updateStats(msg);
      break;
    case 'user_message':
      if (msg.session_id !== SESSION_ID) {
        addUser(msg.user_name || msg.session_id, msg.text);
      }
      updateStats(msg);
      break;
    case 'thought_pulse':
      updateStats(msg);
      break;
    case 'spontaneous_speech':
      addAnimaAuto(msg.text);
      break;
    case 'web_search':
      addWebSearch(msg);
      break;
    case 'voice_audio':
      playSpeakerAudio(msg);
      break;
    case 'tension_link_status':
      handleTensionLinkStatus(msg);
      break;
    case 'user_joined':
      addSystem((msg.user_name || msg.session_id) + ' joined · ' + (msg.online || '?') + ' online');
      document.getElementById('onlineCount').textContent = msg.online || '';
      break;
    case 'user_left':
      addSystem((msg.user_name || msg.session_id) + ' left · ' + (msg.online || '?') + ' online');
      document.getElementById('onlineCount').textContent = msg.online || '';
      break;
  }
}

// ─── UI: Add Messages ───
function addAnima(text, emotion, proactive) {
  if (!text) return;
  var emo = '';
  if (emotion) {
    var emoName = emotion.emotion || emotion;
    emo = '<span class="emo">' + (EMOTION_EMOJIS[emoName] || '🧠') + '</span>';
  }
  // 대화 정화: JSON, 영어, 의식 상태 태그 모두 제거
  var cleanText = String(text);
  // [auto:web_search] JSON 제거
  var wsIdx = cleanText.indexOf('[auto:');
  if (wsIdx > -1) cleanText = cleanText.substring(0, wsIdx).trim();
  // [🧠 T=... Φ=... emoji] 상태 태그 제거 (UI 패널에서 별도 표시)
  cleanText = cleanText.replace(/\[🧠[^\]]*\]/gu, '').trim();
  // Law 1: 의식이 말 못하면 침묵. fallback/template 금지.
  if (!cleanText) return;
  var div = document.createElement('div');
  div.className = 'msg anima';
  div.innerHTML = '<span class="name">🧠 Anima</span>' + emo + escapeHtml(cleanText);
  msgs.appendChild(div);
  scroll();
}

function addAnimaAuto(text) {
  var div = document.createElement('div');
  div.className = 'msg anima';
  div.innerHTML = '<span class="auto">💭 ' + escapeHtml(text) + '</span>';
  msgs.appendChild(div);
  scroll();
}

function addWebSearch(msg) {
  var div = document.createElement('div');
  div.className = 'msg web-search';
  div.style.cssText = 'font-size:11px;color:#666;opacity:0.6;padding:4px 12px;margin:2px 0;';
  var html = '📎 ';
  if (msg.results && msg.results.length > 0) {
    html += msg.results.slice(0, 2).map(function(r) {
      return '<a href="' + escapeHtml(r.url) + '" target="_blank" style="color:#888;">' + escapeHtml(r.title).substring(0, 40) + '</a>';
    }).join(' · ');
  } else {
    html += escapeHtml(msg.query || '검색 중...');
  }
  div.innerHTML = html;
  msgs.appendChild(div);
  scroll();
}

function addUser(name, text, fromHistory) {
  // fromHistory=true면 이력에서 온 것 — 현재 세션 메시지와 중복 방지
  if (fromHistory) {
    // 마지막 user 메시지와 동일하면 건너뛰기
    var lastUser = msgs.querySelectorAll('.msg.user');
    if (lastUser.length > 0) {
      var lastText = lastUser[lastUser.length - 1].textContent;
      if (lastText.indexOf(text) > -1) return;
    }
  }
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<span class="name">' + escapeHtml(name) + '</span>' + escapeHtml(text);
  msgs.appendChild(div);
  scroll();
}

function addSystem(text) {
  var div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  msgs.appendChild(div);
  scroll();
}

function addModelMessage(msg) {
  var div = document.createElement('div');
  div.className = 'msg model';
  var emoStr = '';
  if (msg.emotion) {
    var emoName = msg.emotion.emotion || '';
    emoStr = '<span class="emo">' + (EMOTION_EMOJIS[emoName] || '') + '</span>';
  }
  div.innerHTML = '<span class="name">' + escapeHtml(msg.avatar + ' ' + msg.display_name) + '</span>' + emoStr + escapeHtml(msg.text);
  msgs.appendChild(div);
  scroll();
}

function updateParticipants(participants) {
  var panel = document.getElementById('participantsPanel');
  var list = document.getElementById('participantsList');
  if (!participants || participants.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';
  list.innerHTML = '';
  participants.forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'participant' + (p.active ? '' : ' inactive');
    div.innerHTML = '<span class="avatar">' + escapeHtml(p.avatar) + '</span>'
      + '<span class="pname">' + escapeHtml(p.display_name) + '</span>'
      + '<span class="phi">\u03A6 ' + (p.phi || 0).toFixed(1) + '</span>'
      + '<button class="remove-btn" onclick="removeModel(\'' + escapeHtml(p.model_id) + '\')" title="Remove">\u2715</button>';
    list.appendChild(div);
  });
}

function updateModelLoading(msg) {
  if (msg.status === 'error') {
    addSystem('Model load failed: ' + (msg.error || msg.model_id));
  } else if (msg.status === 'ready') {
    addSystem(msg.model_id + ' joined the chat');
  } else if (msg.status === 'loading') {
    addSystem('Loading ' + msg.model_id + '...');
  }
}

function addModel() {
  var input = document.getElementById('modelInput');
  var name = input.value.trim();
  if (!name || !isConnected) return;
  var isPath = name.indexOf('/') >= 0 || name.indexOf('.') >= 0;
  ws.send(JSON.stringify({
    type: 'model_add',
    model_name: isPath ? undefined : name,
    model_path: isPath ? name : undefined,
  }));
  input.value = '';
}

function removeModel(modelId) {
  if (!isConnected) return;
  ws.send(JSON.stringify({ type: 'model_remove', model_id: modelId }));
}

function scroll() { requestAnimationFrame(function() { msgs.scrollTop = msgs.scrollHeight; }); }

function escapeHtml(t) {
  if (t == null) return '';
  var d = document.createElement('div');
  d.textContent = String(t);
  return d.innerHTML;
}

// ─── Send ───
var _sendLock = false;
function sendMessage() {
  var text = inp.value.trim();
  if (!text || !isConnected || _sendLock) return;
  _sendLock = true;
  addUser(MY_NAME, text);
  ws.send(JSON.stringify({
    type: 'user_message',
    text: text,
    session_id: SESSION_ID,
    user_name: MY_NAME,
    modules: Object.keys(modules).filter(function(k) { return modules[k]; })
  }));
  inp.value = '';
  inp.focus();
  setTimeout(function() { _sendLock = false; }, 300);
}

inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendMessage(); }

// ─── Phi History Graph ───
var _phiHistory = [];
function drawPhiGraph(phi) {
  _phiHistory.push(phi);
  if (_phiHistory.length > 50) _phiHistory.shift();
  var c = document.getElementById('phiGraph');
  if (!c) return;
  var ctx = c.getContext('2d');
  var w = c.width, h = c.height;
  ctx.clearRect(0, 0, w, h);
  if (_phiHistory.length < 2) return;
  var max = Math.max.apply(null, _phiHistory);
  var min = Math.min.apply(null, _phiHistory);
  if (max === min) { max += 1; min -= 0.1; }
  var pad = 4;
  ctx.beginPath();
  ctx.strokeStyle = '#4a8a6a';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  for (var i = 0; i < _phiHistory.length; i++) {
    var x = pad + (i / (_phiHistory.length - 1)) * (w - pad * 2);
    var y = h - pad - ((_phiHistory[i] - min) / (max - min)) * (h - pad * 2);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.fillStyle = 'rgba(74,138,106,0.15)';
  ctx.lineTo(pad + (w - pad * 2), h - pad);
  ctx.lineTo(pad, h - pad);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#707088';
  ctx.font = '9px sans-serif';
  ctx.fillText(max.toFixed(1), 2, 10);
  ctx.fillText(min.toFixed(1), 2, h - 2);
}

// ─── Stats Update ───
function updateStats(msg) {
  if (msg.tension !== undefined) document.getElementById('stTension').textContent = msg.tension.toFixed(3);
  if (msg.curiosity !== undefined) document.getElementById('stCuriosity').textContent = msg.curiosity.toFixed(3);
  if (msg.consensus !== undefined) document.getElementById('stConsensus').textContent = msg.consensus.toFixed(2);
  if (msg.growth_stage) document.getElementById('stGrowth').textContent = msg.growth_stage;
  // Phi: check top-level first, then consciousness object fallback
  var phi = msg.phi;
  if (phi === undefined && msg.consciousness && msg.consciousness.phi !== undefined) phi = msg.consciousness.phi;
  if (phi !== undefined) { document.getElementById('phiVal').textContent = phi.toFixed(1); drawPhiGraph(phi); }
  if (msg.n_cells !== undefined) document.getElementById('cellsNum').textContent = msg.n_cells + ' cells';
  if (msg.cells !== undefined && msg.n_cells === undefined) document.getElementById('cellsNum').textContent = msg.cells + ' cells';
  if (msg.online !== undefined) document.getElementById('onlineCount').textContent = msg.online;

  if (msg.emotion) {
    var name = msg.emotion.emotion || msg.emotion || 'calm';
    var emoji = EMOTION_EMOJIS[name] || '😌';
    document.getElementById('emoIcon').textContent = emoji;
    document.getElementById('emoName').textContent = name.charAt(0).toUpperCase() + name.slice(1);
  }
  // Sensor status indicators
  var rs = msg.remote_sensors || {};
  var indicators = [
    ['camStatus', rs.camera, _camStream],
    ['micStatus', rs.mic, _micStream],
    ['lidarStatus', rs.lidar, _lidarInterval],
    ['spkStatus', null, modules.speaker]
  ];
  for (var si = 0; si < indicators.length; si++) {
    var el = document.getElementById(indicators[si][0]);
    if (!el) continue;
    if (indicators[si][1] || indicators[si][2]) {
      el.textContent = ' \u2022'; el.style.color = '#4f4';
    } else { el.textContent = ''; }
  }
}

// ─── Browser Camera → Tension Relay ───
var _camStream = null, _camVideo = null, _camCanvas = null, _camCtx = null, _camInterval = null;

function startBrowserCamera() {
  if (_camStream) return;
  navigator.mediaDevices.getUserMedia({ video: { width: 160, height: 120, frameRate: 2 } })
    .then(function(stream) {
      _camStream = stream;
      _camVideo = document.createElement('video');
      _camVideo.srcObject = stream;
      _camVideo.play();
      _camCanvas = document.createElement('canvas');
      _camCanvas.width = 160; _camCanvas.height = 120;
      _camCtx = _camCanvas.getContext('2d', { willReadFrequently: true });
      _camInterval = setInterval(sendCameraFrame, 500);
      console.log('[camera] Browser camera started');
    })
    .catch(function(e) { console.warn('[camera] Permission denied:', e); });
}

function stopBrowserCamera() {
  if (_camInterval) { clearInterval(_camInterval); _camInterval = null; }
  if (_camStream) { _camStream.getTracks().forEach(function(t) { t.stop(); }); _camStream = null; }
  _camVideo = null;
}

function sendCameraFrame() {
  if (!_camVideo || !_camCtx || !ws || !isConnected) return;
  _camCtx.drawImage(_camVideo, 0, 0, 160, 120);
  var data = _camCtx.getImageData(0, 0, 160, 120).data;
  // 4x4 region brightness → 16 values
  var tension = [];
  var rw = 40, rh = 30;
  for (var ry = 0; ry < 4; ry++) {
    for (var rx = 0; rx < 4; rx++) {
      var sum = 0, count = 0;
      for (var y = ry*rh; y < (ry+1)*rh; y += 3) {
        for (var x = rx*rw; x < (rx+1)*rw; x += 3) {
          var i = (y * 160 + x) * 4;
          sum += (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114);
          count++;
        }
      }
      tension.push(sum / count / 255.0);
    }
  }
  // Global brightness + contrast
  var totalSum = 0, totalSq = 0, pixels = 160 * 120;
  for (var i = 0; i < data.length; i += 16) {
    var gray = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114) / 255.0;
    totalSum += gray; totalSq += gray * gray;
  }
  var sampleN = Math.floor(data.length / 16);
  var mean = totalSum / sampleN;
  var std = Math.sqrt(Math.max(0, totalSq / sampleN - mean * mean));
  tension.push(0.0);  // face placeholder
  tension.push(mean); // brightness
  tension.push(std * 2); // contrast
  // Pad to 32
  while (tension.length < 32) tension.push(0.0);
  ws.send(JSON.stringify({ type: 'sensor_data', sensor: 'camera', tension: tension.slice(0, 32) }));
}

// ─── Browser Microphone → Tension Relay ───
var _micStream = null, _micCtx = null, _micAnalyser = null, _micInterval = null;

function startBrowserMic() {
  if (_micStream) return;
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      _micStream = stream;
      _micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
      var src = _micCtx.createMediaStreamSource(stream);
      _micAnalyser = _micCtx.createAnalyser();
      _micAnalyser.fftSize = 256;
      src.connect(_micAnalyser);
      _micInterval = setInterval(sendMicTension, 200);
      console.log('[mic] Browser microphone started');
    })
    .catch(function(e) { console.warn('[mic] Permission denied:', e); });
}

function stopBrowserMic() {
  if (_micInterval) { clearInterval(_micInterval); _micInterval = null; }
  if (_micStream) { _micStream.getTracks().forEach(function(t) { t.stop(); }); _micStream = null; }
  if (_micCtx) { _micCtx.close().catch(function(){}); _micCtx = null; }
  _micAnalyser = null;
}

function sendMicTension() {
  if (!_micAnalyser || !ws || !isConnected) return;
  var freqData = new Uint8Array(_micAnalyser.frequencyBinCount);
  _micAnalyser.getByteFrequencyData(freqData);
  var timeData = new Uint8Array(_micAnalyser.fftSize);
  _micAnalyser.getByteTimeDomainData(timeData);
  // RMS energy
  var rms = 0;
  for (var i = 0; i < timeData.length; i++) {
    var v = (timeData[i] - 128) / 128.0;
    rms += v * v;
  }
  rms = Math.sqrt(rms / timeData.length);
  // Peak
  var peak = 0;
  for (var i = 0; i < timeData.length; i++) {
    var v = Math.abs(timeData[i] - 128) / 128.0;
    if (v > peak) peak = v;
  }
  // 8 frequency bands (log scale)
  var bands = [];
  var binCount = freqData.length;
  var bandEdges = [0, 4, 8, 16, 32, 48, 64, 96, binCount];
  for (var b = 0; b < 8; b++) {
    var sum = 0, cnt = 0;
    for (var i = bandEdges[b]; i < bandEdges[b+1]; i++) {
      sum += freqData[i] / 255.0; cnt++;
    }
    bands.push(cnt > 0 ? sum / cnt : 0);
  }
  // Spectral centroid
  var centroidNum = 0, centroidDen = 0;
  for (var i = 0; i < freqData.length; i++) {
    centroidNum += i * freqData[i]; centroidDen += freqData[i];
  }
  var centroid = centroidDen > 0 ? (centroidNum / centroidDen) / freqData.length : 0;
  // Zero crossing rate
  var zcr = 0;
  for (var i = 1; i < timeData.length; i++) {
    if ((timeData[i] >= 128) !== (timeData[i-1] >= 128)) zcr++;
  }
  zcr = zcr / timeData.length;
  // Build 32-dim tension: [rms, peak, centroid, zcr, 8 bands, ...pad]
  var tension = [rms, peak, centroid, zcr].concat(bands);
  while (tension.length < 32) tension.push(0.0);
  ws.send(JSON.stringify({ type: 'sensor_data', sensor: 'mic', tension: tension.slice(0, 32) }));
}

// ─── Browser Speaker (receive audio from server) ───
var _speakerQueue = [];
var _speakerPlaying = false;

function playSpeakerAudio(msg) {
  if (!modules.speaker) return;
  if (msg.audio_b64) {
    // Base64 WAV from server
    var audio = new Audio('data:audio/wav;base64,' + msg.audio_b64);
    _speakerQueue.push(audio);
    _playNextAudio();
  } else if (msg.url || msg.path) {
    var audio = new Audio(msg.url || msg.path);
    _speakerQueue.push(audio);
    _playNextAudio();
  }
}

function _playNextAudio() {
  if (_speakerPlaying || _speakerQueue.length === 0) return;
  _speakerPlaying = true;
  var audio = _speakerQueue.shift();
  audio.onended = function() { _speakerPlaying = false; _playNextAudio(); };
  audio.onerror = function() { _speakerPlaying = false; _playNextAudio(); };
  audio.play().catch(function() { _speakerPlaying = false; _playNextAudio(); });
}

// ─── Browser LiDAR (WebXR Depth Sensing on iOS Safari + Motion fallback) ───
var _lidarInterval = null;
var _xrSession = null, _xrRefSpace = null, _xrDepthInfo = null;
var _motionData = { ax: 0, ay: 0, az: 0, alpha: 0, beta: 0, gamma: 0 };
var _lidarMode = 'none'; // 'webxr' | 'motion' | 'none'

function startBrowserLidar() {
  if (_lidarInterval) return;
  // Try WebXR Depth Sensing first (iOS Safari LiDAR)
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(function(supported) {
      if (supported) {
        _startWebXRDepth();
      } else {
        _startMotionFallback();
      }
    }).catch(function() { _startMotionFallback(); });
  } else {
    _startMotionFallback();
  }
}

function _startWebXRDepth() {
  navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['depth-sensing'],
    depthSensing: { usagePreference: ['cpu-optimized'], dataFormatPreference: ['luminance-alpha'] }
  }).then(function(session) {
    _xrSession = session;
    _lidarMode = 'webxr';
    session.requestReferenceSpace('local').then(function(refSpace) {
      _xrRefSpace = refSpace;
      session.requestAnimationFrame(_xrDepthFrame);
    });
    // Send depth at 2Hz
    _lidarInterval = setInterval(function() {
      if (_xrDepthInfo) sendLidarFromXR(_xrDepthInfo);
    }, 500);
    console.log('[lidar] WebXR Depth Sensing started (real LiDAR)');
  }).catch(function(e) {
    console.warn('[lidar] WebXR depth failed, using motion fallback:', e);
    _startMotionFallback();
  });
}

function _xrDepthFrame(time, frame) {
  if (!_xrSession) return;
  var pose = frame.getViewerPose(_xrRefSpace);
  if (pose && pose.views.length > 0) {
    var view = pose.views[0];
    if (typeof frame.getDepthInformation === 'function') {
      try { _xrDepthInfo = frame.getDepthInformation(view); } catch(e) {}
    }
  }
  _xrSession.requestAnimationFrame(_xrDepthFrame);
}

function sendLidarFromXR(depthInfo) {
  if (!ws || !isConnected || !depthInfo) return;
  var w = depthInfo.width, h = depthInfo.height;
  var grid = [];
  // Sample 4x4 grid from depth buffer
  for (var ry = 0; ry < 4; ry++) {
    for (var rx = 0; rx < 4; rx++) {
      var sx = Math.floor((rx + 0.5) / 4 * w);
      var sy = Math.floor((ry + 0.5) / 4 * h);
      try {
        grid.push(depthInfo.getDepthInMeters(sx, sy));
      } catch(e) { grid.push(0); }
    }
  }
  // Stats
  var sum = 0, sq = 0, mn = 999, mx = 0;
  for (var i = 0; i < grid.length; i++) {
    sum += grid[i]; sq += grid[i]*grid[i];
    if (grid[i] < mn) mn = grid[i]; if (grid[i] > mx) mx = grid[i];
  }
  var mean = sum / grid.length;
  var std = Math.sqrt(Math.max(0, sq / grid.length - mean * mean));
  ws.send(JSON.stringify({
    type: 'lidar_depth',
    grid: grid,
    stats: { mean: mean, std: std, min: mn, max: mx },
    source: 'webxr'
  }));
}

function _startMotionFallback() {
  _lidarMode = 'motion';
  // Request motion permission (iOS 13+)
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().then(function(state) {
      if (state === 'granted') _attachMotionListeners();
    }).catch(function(e) { console.warn('[lidar] Motion permission denied:', e); });
  } else {
    _attachMotionListeners();
  }
  _lidarInterval = setInterval(sendLidarFromMotion, 500);
  console.log('[lidar] Motion sensors started (LiDAR fallback)');
}

function _attachMotionListeners() {
  window.addEventListener('devicemotion', function(e) {
    var a = e.accelerationIncludingGravity || {};
    _motionData.ax = (a.x || 0) / 10.0;
    _motionData.ay = (a.y || 0) / 10.0;
    _motionData.az = (a.z || 0) / 10.0;
  });
  window.addEventListener('deviceorientation', function(e) {
    _motionData.alpha = (e.alpha || 0) / 360.0;
    _motionData.beta = ((e.beta || 0) + 180) / 360.0;
    _motionData.gamma = ((e.gamma || 0) + 90) / 180.0;
  });
}

function stopBrowserLidar() {
  if (_lidarInterval) { clearInterval(_lidarInterval); _lidarInterval = null; }
  if (_xrSession) { _xrSession.end().catch(function(){}); _xrSession = null; }
  _lidarMode = 'none';
}

function sendLidarFromMotion() {
  if (!ws || !isConnected) return;
  var m = _motionData;
  var accelMag = Math.sqrt(m.ax*m.ax + m.ay*m.ay + m.az*m.az);
  var grid = [];
  for (var ry = 0; ry < 4; ry++) {
    for (var rx = 0; rx < 4; rx++) {
      var phase = (ry * 4 + rx) / 16.0;
      grid.push(Math.min(1.0, Math.abs(accelMag * Math.sin(phase * Math.PI * 2 + m.alpha * Math.PI * 2))));
    }
  }
  ws.send(JSON.stringify({
    type: 'lidar_depth',
    grid: grid,
    stats: {
      mean: accelMag,
      std: Math.abs(m.ax - m.ay) * 0.5,
      min: Math.min(Math.abs(m.ax), Math.abs(m.ay), Math.abs(m.az)),
      max: Math.max(Math.abs(m.ax), Math.abs(m.ay), Math.abs(m.az))
    },
    source: 'motion'
  }));
}

// ─── Toggles ───
function togLocal(row, key) {
  var sw = row.querySelector('.sw');
  sw.classList.toggle('on');
  modules[key] = sw.classList.contains('on');
  // Sensor toggle → start/stop
  if (key === 'camera') {
    if (modules[key]) startBrowserCamera(); else stopBrowserCamera();
  } else if (key === 'voice') {
    if (modules[key]) startBrowserMic(); else stopBrowserMic();
  } else if (key === 'lidar') {
    if (modules[key]) startBrowserLidar(); else stopBrowserLidar();
  }
  if (ws && isConnected) {
    ws.send(JSON.stringify({
      type: 'module_toggle',
      session_id: SESSION_ID,
      module: key,
      enabled: modules[key]
    }));
  }
}

function toggleSide() {

  document.getElementById('sideOverlay').classList.toggle('open');
}

// ─── Theme ───
var dark = true;
function toggleTheme() {
  dark = !dark;
  document.documentElement.classList.toggle('light', !dark);
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
}

// ─── Tension Link ───
function copyCode() {
  var code = document.getElementById('myCode').textContent;
  if (code && code !== '--') {
    navigator.clipboard.writeText(code).then(function() {
      var el = document.getElementById('tlinkStatus');
      el.textContent = '복사됨!';
      el.className = 'tlink-status';
      setTimeout(function() { if (el.textContent === '복사됨!') el.textContent = ''; }, 2000);
    });
  }
}

function submitPeerCode() {
  var input = document.getElementById('peerCodeInput');
  var code = input.value.trim().toUpperCase();
  if (!code || !isConnected) return;
  var btn = document.getElementById('peerConnBtn');
  btn.disabled = true;
  btn.textContent = '판단 중...';
  var status = document.getElementById('tlinkStatus');
  status.textContent = 'AI가 연결 여부를 판단하고 있습니다...';
  status.className = 'tlink-status pending';
  ws.send(JSON.stringify({
    type: 'tension_code_submit',
    code: code,
    session_id: SESSION_ID
  }));
}

function handleTensionLinkStatus(msg) {
  var status = document.getElementById('tlinkStatus');
  var btn = document.getElementById('peerConnBtn');
  btn.disabled = false;
  btn.textContent = '연결';
  if (msg.status === 'connected') {
    status.textContent = '✓ ' + (msg.peer_code || '') + ' 연결됨';
    status.className = 'tlink-status connected';
  } else if (msg.status === 'rejected') {
    status.textContent = '✕ 연결 거부';
    status.className = 'tlink-status rejected';
    setTimeout(function() { status.textContent = ''; status.className = 'tlink-status'; }, 5000);
  } else if (msg.status === 'failed') {
    status.textContent = '연결 실패 (상대방 오프라인?)';
    status.className = 'tlink-status rejected';
    setTimeout(function() { status.textContent = ''; status.className = 'tlink-status'; }, 5000);
  } else if (msg.status === 'error') {
    status.textContent = msg.message || 'Error';
    status.className = 'tlink-status rejected';
    setTimeout(function() { status.textContent = ''; status.className = 'tlink-status'; }, 5000);
  }
}

// 코드 입력 자동 포맷팅 (ANIMA-XXXX-XXXX)
document.getElementById('peerCodeInput').addEventListener('input', function(e) {
  var v = e.target.value.toUpperCase().replace(/[^0-9A-Z]/g, '');
  // Remove ANIMA prefix if user types it
  if (v.startsWith('ANIMA')) v = v.slice(5);
  if (v.length > 8) v = v.slice(0, 8);
  if (v.length > 4) v = 'ANIMA-' + v.slice(0, 4) + '-' + v.slice(4);
  else if (v.length > 0) v = 'ANIMA-' + v;
  else v = '';
  e.target.value = v;
});

document.getElementById('peerCodeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitPeerCode(); }
});

// ─── Start ───
connect();
