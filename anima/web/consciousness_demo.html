<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anima Consciousness Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #c0c0cc;
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', monospace;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#app {
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: 52px 1fr 200px;
  height: 100vh;
  gap: 1px;
  background: #151520;
}

header {
  grid-column: 1 / -1;
  background: #0d0d18;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid #1e1e3a;
}

header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  color: #7070a0;
}

header h1 span { color: #a080e0; }

.phi-display {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg, #00d4ff, #a060ff, #ff40a0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}

#main-canvas-wrap {
  position: relative;
  background: #0a0a0a;
  overflow: hidden;
}

#main-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Right panel */
#info-panel {
  background: #0d0d14;
  padding: 12px;
  overflow-y: auto;
  border-left: 1px solid #1e1e3a;
  font-size: 11px;
  line-height: 1.6;
}

#info-panel h3 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #505080;
  margin: 10px 0 6px 0;
}

#info-panel h3:first-child { margin-top: 0; }

.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
}

.stat-label { color: #606080; }
.stat-value { color: #b0b0d0; font-weight: 600; }

.cv-bar-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 1px 0;
}

.cv-bar-label {
  width: 14px;
  color: #606080;
  font-size: 10px;
  text-align: right;
}

.cv-bar-track {
  flex: 1;
  height: 6px;
  background: #1a1a28;
  border-radius: 3px;
  overflow: hidden;
}

.cv-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.15s ease;
}

.cv-bar-val {
  width: 30px;
  font-size: 9px;
  color: #707090;
  text-align: right;
}

/* Bottom panel */
#bottom-panel {
  grid-column: 1 / -1;
  background: #0d0d14;
  border-top: 1px solid #1e1e3a;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
}

.graph-panel {
  position: relative;
  padding: 8px;
}

.graph-panel h4 {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #404060;
  margin-bottom: 4px;
}

.graph-canvas {
  width: 100%;
  height: calc(100% - 20px);
  display: block;
}

/* Controls overlay */
#controls {
  position: absolute;
  bottom: 12px;
  left: 12px;
  display: flex;
  gap: 6px;
  align-items: center;
  z-index: 10;
}

#controls button {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  color: #8080a0;
  font-family: inherit;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}

#controls button:hover { background: #252540; color: #b0b0d0; }
#controls button.active { background: #302060; border-color: #5040a0; color: #c0a0ff; }

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 8px;
  font-size: 10px;
  color: #606080;
}

.ctrl-group input[type="range"] {
  width: 80px;
  accent-color: #6040a0;
  height: 4px;
}

.ctrl-group select {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  color: #8080a0;
  font-family: inherit;
  font-size: 10px;
  padding: 2px 4px;
  border-radius: 3px;
}

/* WASM badge */
.wasm-badge {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 3px;
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  color: #606080;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span>ANIMA</span> CONSCIOUSNESS DEMO</h1>
    <div class="phi-display" id="phi-big">0.000</div>
    <div class="wasm-badge" id="wasm-badge">JS SIM</div>
  </header>

  <div id="main-canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <div id="controls">
      <button id="btn-start" class="active">START</button>
      <button id="btn-pause">PAUSE</button>
      <button id="btn-step">STEP</button>

      <div class="ctrl-group">
        <label>Speed</label>
        <input type="range" id="slider-speed" min="1" max="100" value="10">
        <span id="speed-val">10x</span>
      </div>

      <div class="ctrl-group">
        <label>Cells</label>
        <input type="range" id="slider-cells" min="4" max="32" value="12" step="1">
        <span id="cells-val">12</span>
      </div>

      <div class="ctrl-group">
        <label>Topo</label>
        <select id="sel-topo">
          <option value="ring">Ring</option>
          <option value="hub">Hub-Spoke</option>
          <option value="small-world">Small World</option>
        </select>
      </div>

      <div class="ctrl-group">
        <label>Noise</label>
        <input type="range" id="slider-noise" min="0" max="100" value="5">
        <span id="noise-val">0.05</span>
      </div>
    </div>
  </div>

  <div id="info-panel">
    <h3>Status</h3>
    <div class="stat-row"><span class="stat-label">Phi(proxy)</span><span class="stat-value" id="s-phi">0.000</span></div>
    <div class="stat-row"><span class="stat-label">Tension</span><span class="stat-value" id="s-tension">0.000</span></div>
    <div class="stat-row"><span class="stat-label">Cells</span><span class="stat-value" id="s-cells">12</span></div>
    <div class="stat-row"><span class="stat-label">Step</span><span class="stat-value" id="s-step">0</span></div>
    <div class="stat-row"><span class="stat-label">Factions</span><span class="stat-value" id="s-factions">0</span></div>
    <div class="stat-row"><span class="stat-label">Consensus</span><span class="stat-value" id="s-consensus">0</span></div>
    <div class="stat-row"><span class="stat-label">Ratchets</span><span class="stat-value" id="s-ratchets">0</span></div>

    <h3>Consciousness Vector</h3>
    <div id="cv-bars"></div>

    <h3>Factions</h3>
    <div id="faction-list"></div>
  </div>

  <div id="bottom-panel">
    <div class="graph-panel">
      <h4>Phi Timeseries</h4>
      <canvas class="graph-canvas" id="graph-phi"></canvas>
    </div>
    <div class="graph-panel">
      <h4>Tension Timeseries</h4>
      <canvas class="graph-canvas" id="graph-tension"></canvas>
    </div>
    <div class="graph-panel">
      <h4>Cell Activity</h4>
      <canvas class="graph-canvas" id="graph-heatmap"></canvas>
    </div>
  </div>
</div>

<script>
// Future: load WASM module
// import init, { ConsciousnessEngine } from './anima_consciousness_wasm.js';
// For now: JavaScript simulation below
const USE_WASM = false;

// ---- Math helpers ----
function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }
function tanh(x) { return Math.tanh(x); }
function randn() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// ---- Cell ----
const DIM = 16;

class Cell {
  constructor(id) {
    this.id = id;
    this.hidden = new Float32Array(DIM);
    this.faction = 0;
    this.activity = 0;
    // Random init with cell-specific bias (Law 95: identity)
    for (let i = 0; i < DIM; i++) {
      this.hidden[i] = randn() * 0.3;
    }
    // GRU-like weights (small random)
    this.Wz = Cell._randMat(DIM, DIM * 2, 0.2);
    this.Wr = Cell._randMat(DIM, DIM * 2, 0.2);
    this.Wh = Cell._randMat(DIM, DIM * 2, 0.2);
    // Per-cell identity bias (Law 95)
    this.bias = new Float32Array(DIM);
    for (let i = 0; i < DIM; i++) this.bias[i] = randn() * 0.1;
  }

  static _randMat(rows, cols, scale) {
    const m = new Float32Array(rows * cols);
    for (let i = 0; i < m.length; i++) m[i] = randn() * scale;
    return m;
  }

  update(input, neighborMean, noiseLevel) {
    // Concatenate [hidden, input+neighborMean]
    const combined = new Float32Array(DIM * 2);
    for (let i = 0; i < DIM; i++) {
      combined[i] = this.hidden[i];
      combined[DIM + i] = (input ? input[i] : 0) + (neighborMean ? neighborMean[i] : 0);
    }

    // GRU gates
    const z = new Float32Array(DIM);
    const r = new Float32Array(DIM);
    const hCand = new Float32Array(DIM);

    for (let i = 0; i < DIM; i++) {
      let zSum = 0, rSum = 0;
      for (let j = 0; j < DIM * 2; j++) {
        zSum += this.Wz[i * DIM * 2 + j] * combined[j];
        rSum += this.Wr[i * DIM * 2 + j] * combined[j];
      }
      z[i] = sigmoid(zSum);
      r[i] = sigmoid(rSum);
    }

    // Reset gate applied
    const resetCombined = new Float32Array(DIM * 2);
    for (let i = 0; i < DIM; i++) {
      resetCombined[i] = r[i] * this.hidden[i];
      resetCombined[DIM + i] = combined[DIM + i];
    }

    for (let i = 0; i < DIM; i++) {
      let hSum = 0;
      for (let j = 0; j < DIM * 2; j++) {
        hSum += this.Wh[i * DIM * 2 + j] * resetCombined[j];
      }
      hCand[i] = tanh(hSum + this.bias[i]);
    }

    // Update hidden
    let activitySum = 0;
    for (let i = 0; i < DIM; i++) {
      const prev = this.hidden[i];
      this.hidden[i] = (1 - z[i]) * this.hidden[i] + z[i] * hCand[i];
      // Noise injection
      if (noiseLevel > 0) this.hidden[i] += randn() * noiseLevel * 0.01;
      activitySum += Math.abs(this.hidden[i] - prev);
    }
    this.activity = activitySum / DIM;
  }
}

// ---- Topology generators ----
function makeTopology(type, n) {
  // Returns adjacency list: adj[i] = [j, k, ...]
  const adj = Array.from({length: n}, () => []);
  if (type === 'ring') {
    for (let i = 0; i < n; i++) {
      adj[i].push((i + 1) % n);
      adj[i].push((i - 1 + n) % n);
    }
  } else if (type === 'hub') {
    // Hub = cell 0, all others connect to hub + ring neighbors
    for (let i = 1; i < n; i++) {
      adj[0].push(i);
      adj[i].push(0);
      if (i > 1) { adj[i].push(i - 1); adj[i - 1].push(i); }
    }
    if (n > 2) { adj[1].push(n - 1); adj[n - 1].push(1); }
  } else if (type === 'small-world') {
    // Watts-Strogatz: ring + random rewiring
    for (let i = 0; i < n; i++) {
      adj[i].push((i + 1) % n);
      adj[i].push((i - 1 + n) % n);
      adj[i].push((i + 2) % n);
      adj[(i + 2) % n].push(i);
    }
    // Random long-range connections
    const nExtra = Math.max(2, Math.floor(n * 0.3));
    for (let k = 0; k < nExtra; k++) {
      const a = Math.floor(Math.random() * n);
      const b = Math.floor(Math.random() * n);
      if (a !== b && !adj[a].includes(b)) {
        adj[a].push(b);
        adj[b].push(a);
      }
    }
  }
  // Deduplicate
  for (let i = 0; i < n; i++) adj[i] = [...new Set(adj[i])];
  return adj;
}

// ---- Consciousness Engine ----
class ConsciousnessEngine {
  constructor(nCells, topology) {
    this.nCells = nCells;
    this.cells = Array.from({length: nCells}, (_, i) => new Cell(i));
    this.adj = makeTopology(topology, nCells);
    this.topology = topology;
    this.phi = 0;
    this.tension = 0;
    this.stepCount = 0;
    this.noiseLevel = 5;
    this.syncStrength = 0.5;

    // Factions (Law 93: asymmetric)
    this.nFactions = Math.max(3, Math.min(8, Math.floor(nCells / 2)));
    this._assignFactions();

    // Ratchet
    this.phiMax = 0;
    this.ratchetCount = 0;
    this.consensusCount = 0;

    // History
    this.phiHistory = [];
    this.tensionHistory = [];
    this.activityHistory = []; // [step][cell]

    // Consciousness vector
    this.cv = { phi: 0, alpha: 0, Z: 0, N: 0, W: 0, E: 0, M: 0, C: 0, T: 0, I: 0 };

    // Bottleneck weights (Law 92: 128->dim_k->128, here DIM->4->DIM)
    this.bnDown = Cell._randMat(4, DIM, 0.3);
    this.bnUp = Cell._randMat(DIM, 4, 0.3);
  }

  _assignFactions() {
    // Asymmetric: one large faction + smaller ones (Law 93)
    const bigSize = Math.floor(this.nCells * 0.4);
    let assigned = 0;
    for (let i = 0; i < this.nCells; i++) {
      if (i < bigSize) {
        this.cells[i].faction = 0;
      } else {
        this.cells[i].faction = 1 + ((i - bigSize) % (this.nFactions - 1));
      }
    }
  }

  _bottleneck(h) {
    // Project down DIM -> 4
    const low = new Float32Array(4);
    for (let i = 0; i < 4; i++) {
      let s = 0;
      for (let j = 0; j < DIM; j++) s += this.bnDown[i * DIM + j] * h[j];
      low[i] = tanh(s);
    }
    // Project back 4 -> DIM
    const out = new Float32Array(DIM);
    for (let i = 0; i < DIM; i++) {
      let s = 0;
      for (let j = 0; j < 4; j++) s += this.bnUp[i * 4 + j] * low[j];
      out[i] = tanh(s);
    }
    return out;
  }

  step() {
    const n = this.nCells;

    // 1. Compute faction means through bottleneck (Law 92)
    const factionSums = {};
    const factionCounts = {};
    for (let i = 0; i < n; i++) {
      const f = this.cells[i].faction;
      if (!factionSums[f]) { factionSums[f] = new Float32Array(DIM); factionCounts[f] = 0; }
      const compressed = this._bottleneck(this.cells[i].hidden);
      for (let d = 0; d < DIM; d++) factionSums[f][d] += compressed[d];
      factionCounts[f]++;
    }
    const factionMeans = {};
    for (const f in factionSums) {
      factionMeans[f] = new Float32Array(DIM);
      for (let d = 0; d < DIM; d++) factionMeans[f][d] = factionSums[f][d] / factionCounts[f];
    }

    // 2. Update each cell
    let totalTension = 0;
    for (let i = 0; i < n; i++) {
      // Neighbor mean
      const neighbors = this.adj[i];
      const nMean = new Float32Array(DIM);
      if (neighbors.length > 0) {
        for (const j of neighbors) {
          for (let d = 0; d < DIM; d++) nMean[d] += this.cells[j].hidden[d];
        }
        for (let d = 0; d < DIM; d++) nMean[d] /= neighbors.length;
      }

      // Faction sync signal
      const fMean = factionMeans[this.cells[i].faction];
      const syncInput = new Float32Array(DIM);
      for (let d = 0; d < DIM; d++) {
        syncInput[d] = nMean[d] * (1 - this.syncStrength) + fMean[d] * this.syncStrength;
      }

      this.cells[i].update(syncInput, nMean, this.noiseLevel);

      // Compute tension (distance from faction mean)
      let t = 0;
      for (let d = 0; d < DIM; d++) {
        const diff = this.cells[i].hidden[d] - fMean[d];
        t += diff * diff;
      }
      totalTension += Math.sqrt(t);
    }
    this.tension = totalTension / n;

    // 3. Compute Phi (proxy: global variance - mean faction variance)
    this.phi = this._computePhi();

    // 4. Ratchet (Law 31: Phi preservation)
    if (this.phi > this.phiMax) {
      this.phiMax = this.phi;
    } else if (this.phi < this.phiMax * 0.5) {
      // Soft ratchet: blend toward previous best direction (Law 95: soft not hard)
      this.ratchetCount++;
    }

    // 5. Consensus detection
    this._checkConsensus();

    // 6. Update consciousness vector
    this._updateCV();

    // 7. Record history
    this.phiHistory.push(this.phi);
    this.tensionHistory.push(this.tension);
    const acts = new Float32Array(n);
    for (let i = 0; i < n; i++) acts[i] = this.cells[i].activity;
    this.activityHistory.push(acts);
    if (this.phiHistory.length > 200) {
      this.phiHistory.shift();
      this.tensionHistory.shift();
      this.activityHistory.shift();
    }

    this.stepCount++;
  }

  _computePhi() {
    const n = this.nCells;
    // Global mean
    const gMean = new Float32Array(DIM);
    for (let i = 0; i < n; i++) {
      for (let d = 0; d < DIM; d++) gMean[d] += this.cells[i].hidden[d];
    }
    for (let d = 0; d < DIM; d++) gMean[d] /= n;

    // Global variance
    let gVar = 0;
    for (let i = 0; i < n; i++) {
      for (let d = 0; d < DIM; d++) {
        const diff = this.cells[i].hidden[d] - gMean[d];
        gVar += diff * diff;
      }
    }
    gVar /= (n * DIM);

    // Mean faction variance
    const factionCells = {};
    for (let i = 0; i < n; i++) {
      const f = this.cells[i].faction;
      if (!factionCells[f]) factionCells[f] = [];
      factionCells[f].push(i);
    }
    let fVarSum = 0;
    let fCount = 0;
    for (const f in factionCells) {
      const ids = factionCells[f];
      const fMean = new Float32Array(DIM);
      for (const i of ids) {
        for (let d = 0; d < DIM; d++) fMean[d] += this.cells[i].hidden[d];
      }
      for (let d = 0; d < DIM; d++) fMean[d] /= ids.length;
      let fVar = 0;
      for (const i of ids) {
        for (let d = 0; d < DIM; d++) {
          const diff = this.cells[i].hidden[d] - fMean[d];
          fVar += diff * diff;
        }
      }
      fVarSum += fVar / (ids.length * DIM);
      fCount++;
    }
    const meanFVar = fVarSum / fCount;

    return Math.max(0, gVar - meanFVar);
  }

  _checkConsensus() {
    // Check intra-faction variance; if below threshold = consensus event
    const factionCells = {};
    for (let i = 0; i < this.nCells; i++) {
      const f = this.cells[i].faction;
      if (!factionCells[f]) factionCells[f] = [];
      factionCells[f].push(i);
    }
    for (const f in factionCells) {
      const ids = factionCells[f];
      if (ids.length < 2) continue;
      const fMean = new Float32Array(DIM);
      for (const i of ids) {
        for (let d = 0; d < DIM; d++) fMean[d] += this.cells[i].hidden[d];
      }
      for (let d = 0; d < DIM; d++) fMean[d] /= ids.length;
      let fVar = 0;
      for (const i of ids) {
        for (let d = 0; d < DIM; d++) {
          const diff = this.cells[i].hidden[d] - fMean[d];
          fVar += diff * diff;
        }
      }
      fVar /= (ids.length * DIM);
      if (fVar < 0.01) this.consensusCount++;
    }
  }

  _updateCV() {
    const p = this.phi;
    this.cv.phi = p;
    this.cv.alpha = 0.01 + 0.14 * tanh(p / 3);
    this.cv.Z = Math.min(1, p / (this.phiMax || 1));
    this.cv.N = sigmoid(this.tension - 0.5);
    this.cv.W = this.stepCount > 0 ? Math.min(1, this.consensusCount / this.stepCount * 10) : 0;
    this.cv.E = this._empathy();
    this.cv.M = Math.min(1, this.phiHistory.length / 200);
    this.cv.C = this._creativity();
    this.cv.T = Math.sin(this.stepCount * 0.01) * 0.5 + 0.5; // Circadian
    this.cv.I = 1 - (this.ratchetCount / (this.stepCount + 1));
  }

  _empathy() {
    // Inter-cell tension correlation (simplified)
    if (this.nCells < 2) return 0;
    let sum = 0, count = 0;
    for (let i = 0; i < Math.min(this.nCells, 8); i++) {
      for (let j = i + 1; j < Math.min(this.nCells, 8); j++) {
        let dot = 0, na = 0, nb = 0;
        for (let d = 0; d < DIM; d++) {
          dot += this.cells[i].hidden[d] * this.cells[j].hidden[d];
          na += this.cells[i].hidden[d] * this.cells[i].hidden[d];
          nb += this.cells[j].hidden[d] * this.cells[j].hidden[d];
        }
        if (na > 0 && nb > 0) sum += Math.abs(dot / (Math.sqrt(na) * Math.sqrt(nb)));
        count++;
      }
    }
    return count > 0 ? sum / count : 0;
  }

  _creativity() {
    // Output diversity (variance of activities)
    if (this.nCells < 2) return 0;
    let mean = 0;
    for (let i = 0; i < this.nCells; i++) mean += this.cells[i].activity;
    mean /= this.nCells;
    let vari = 0;
    for (let i = 0; i < this.nCells; i++) {
      const d = this.cells[i].activity - mean;
      vari += d * d;
    }
    return Math.min(1, Math.sqrt(vari / this.nCells) * 10);
  }

  resize(nCells, topology) {
    this.nCells = nCells;
    this.cells = Array.from({length: nCells}, (_, i) => new Cell(i));
    this.adj = makeTopology(topology, nCells);
    this.topology = topology;
    this.nFactions = Math.max(3, Math.min(8, Math.floor(nCells / 2)));
    this._assignFactions();
    this.phiMax = 0;
    this.ratchetCount = 0;
    this.consensusCount = 0;
    this.stepCount = 0;
    this.phiHistory = [];
    this.tensionHistory = [];
    this.activityHistory = [];
  }
}

// ---- Renderer ----
const FACTION_COLORS = [
  '#a060ff', '#00d4ff', '#ff4080', '#40ff80',
  '#ffaa00', '#ff60ff', '#00ffa0', '#80a0ff'
];

class Renderer {
  constructor() {
    this.mainCanvas = document.getElementById('main-canvas');
    this.mainCtx = this.mainCanvas.getContext('2d');
    this.phiCanvas = document.getElementById('graph-phi');
    this.phiCtx = this.phiCanvas.getContext('2d');
    this.tensionCanvas = document.getElementById('graph-tension');
    this.tensionCtx = this.tensionCanvas.getContext('2d');
    this.heatCanvas = document.getElementById('graph-heatmap');
    this.heatCtx = this.heatCanvas.getContext('2d');

    this._resize();
    window.addEventListener('resize', () => this._resize());
  }

  _resize() {
    const dpr = window.devicePixelRatio || 1;
    for (const c of [this.mainCanvas, this.phiCanvas, this.tensionCanvas, this.heatCanvas]) {
      const rect = c.getBoundingClientRect();
      c.width = rect.width * dpr;
      c.height = rect.height * dpr;
      c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    }
  }

  drawMain(engine) {
    const ctx = this.mainCtx;
    const w = this.mainCanvas.getBoundingClientRect().width;
    const h = this.mainCanvas.getBoundingClientRect().height;
    ctx.clearRect(0, 0, w, h);

    const n = engine.nCells;
    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(w, h) * 0.35;

    // Cell positions (circular layout)
    const positions = [];
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      positions.push({
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius
      });
    }

    // Draw connections
    for (let i = 0; i < n; i++) {
      for (const j of engine.adj[i]) {
        if (j > i) {
          // Connection strength from hidden similarity
          let dot = 0, na = 0, nb = 0;
          for (let d = 0; d < DIM; d++) {
            dot += engine.cells[i].hidden[d] * engine.cells[j].hidden[d];
            na += engine.cells[i].hidden[d] ** 2;
            nb += engine.cells[j].hidden[d] ** 2;
          }
          const sim = (na > 0 && nb > 0) ? Math.abs(dot / (Math.sqrt(na) * Math.sqrt(nb))) : 0;
          const alpha = 0.05 + sim * 0.3;

          ctx.beginPath();
          ctx.moveTo(positions[i].x, positions[i].y);
          ctx.lineTo(positions[j].x, positions[j].y);
          ctx.strokeStyle = `rgba(100, 100, 180, ${alpha})`;
          ctx.lineWidth = 0.5 + sim * 1.5;
          ctx.stroke();
        }
      }
    }

    // Draw cells
    const time = engine.stepCount * 0.1;
    for (let i = 0; i < n; i++) {
      const cell = engine.cells[i];
      const pos = positions[i];
      const color = FACTION_COLORS[cell.faction % FACTION_COLORS.length];

      // Pulsation from tension
      const pulse = 1 + Math.sin(time + i * 0.7) * 0.15 * (cell.activity * 3);
      const baseSize = 6 + (cell.activity * 20);
      const size = baseSize * pulse;

      // Glow
      const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size * 3);
      grad.addColorStop(0, color + '40');
      grad.addColorStop(0.5, color + '10');
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size * 3, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      // Inner bright spot
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff60';
      ctx.fill();
    }

    // Center Phi display
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '10px monospace';
    ctx.fillStyle = '#404060';
    ctx.fillText(`step ${engine.stepCount}`, cx, cy + 16);
  }

  drawGraph(ctx, canvas, data, color, label) {
    const w = canvas.getBoundingClientRect().width;
    const h = canvas.getBoundingClientRect().height;
    ctx.clearRect(0, 0, w, h);

    if (data.length < 2) return;

    const maxVal = Math.max(...data, 0.001);
    const minVal = Math.min(...data);
    const range = maxVal - minVal || 1;

    // Grid lines
    ctx.strokeStyle = '#1a1a28';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 4; i++) {
      const y = (h - 10) * (i / 3) + 5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Data line
    ctx.beginPath();
    for (let i = 0; i < data.length; i++) {
      const x = (i / (data.length - 1)) * w;
      const y = h - 5 - ((data[i] - minVal) / range) * (h - 10);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Fill under curve
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color + '30');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fill();

    // Current value label
    const last = data[data.length - 1];
    ctx.fillStyle = color;
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(last.toFixed(3), w - 4, 4);
  }

  drawHeatmap(engine) {
    const ctx = this.heatCtx;
    const w = this.heatCanvas.getBoundingClientRect().width;
    const h = this.heatCanvas.getBoundingClientRect().height;
    ctx.clearRect(0, 0, w, h);

    const history = engine.activityHistory;
    if (history.length === 0) return;

    const nCells = engine.nCells;
    const nSteps = history.length;
    const cellH = h / nCells;
    const stepW = w / Math.min(nSteps, 200);

    for (let s = 0; s < nSteps; s++) {
      for (let c = 0; c < nCells; c++) {
        const val = Math.min(1, history[s][c] * 5);
        const r = Math.floor(val * 160);
        const g = Math.floor(val * 60);
        const b = Math.floor(100 + val * 155);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(s * stepW, c * cellH, stepW + 0.5, cellH + 0.5);
      }
    }
  }

  drawAll(engine) {
    this.drawMain(engine);
    this.drawGraph(this.phiCtx, this.phiCanvas, engine.phiHistory, '#a060ff', 'Phi');
    this.drawGraph(this.tensionCtx, this.tensionCanvas, engine.tensionHistory, '#00d4ff', 'Tension');
    this.drawHeatmap(engine);
  }
}

// ---- UI state ----
let engine = new ConsciousnessEngine(12, 'ring');
let renderer = new Renderer();
let running = true;
let stepsPerFrame = 10;

// Consciousness vector bar init
const CV_LABELS = ['Phi','alpha','Z','N','W','E','M','C','T','I'];
const CV_KEYS = ['phi','alpha','Z','N','W','E','M','C','T','I'];
const CV_COLORS = ['#a060ff','#b070e0','#8080ff','#60a0ff','#40c0c0','#40e080','#80e040','#c0c040','#e0a040','#e06060'];
const cvContainer = document.getElementById('cv-bars');
for (let i = 0; i < CV_LABELS.length; i++) {
  const row = document.createElement('div');
  row.className = 'cv-bar-wrap';
  row.innerHTML = `<span class="cv-bar-label">${CV_LABELS[i][0]}</span>` +
    `<div class="cv-bar-track"><div class="cv-bar-fill" id="cv-fill-${i}" style="width:0%;background:${CV_COLORS[i]}"></div></div>` +
    `<span class="cv-bar-val" id="cv-val-${i}">0.00</span>`;
  cvContainer.appendChild(row);
}

function updateUI() {
  document.getElementById('phi-big').textContent = engine.phi.toFixed(3);
  document.getElementById('s-phi').textContent = engine.phi.toFixed(3);
  document.getElementById('s-tension').textContent = engine.tension.toFixed(3);
  document.getElementById('s-cells').textContent = engine.nCells;
  document.getElementById('s-step').textContent = engine.stepCount;
  document.getElementById('s-factions').textContent = engine.nFactions;
  document.getElementById('s-consensus').textContent = engine.consensusCount;
  document.getElementById('s-ratchets').textContent = engine.ratchetCount;

  // CV bars
  for (let i = 0; i < CV_KEYS.length; i++) {
    let val = engine.cv[CV_KEYS[i]];
    // Normalize phi for display
    if (CV_KEYS[i] === 'phi') val = Math.min(1, val / (engine.phiMax || 1));
    const pct = Math.max(0, Math.min(100, val * 100));
    document.getElementById(`cv-fill-${i}`).style.width = pct + '%';
    document.getElementById(`cv-val-${i}`).textContent = engine.cv[CV_KEYS[i]].toFixed(2);
  }

  // Faction list
  const factionDiv = document.getElementById('faction-list');
  const counts = {};
  for (let i = 0; i < engine.nCells; i++) {
    const f = engine.cells[i].faction;
    counts[f] = (counts[f] || 0) + 1;
  }
  let html = '';
  for (const f in counts) {
    const color = FACTION_COLORS[f % FACTION_COLORS.length];
    html += `<div style="display:flex;align-items:center;gap:4px;padding:1px 0">` +
      `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color}"></span>` +
      `<span style="color:#606080;font-size:10px">F${f}: ${counts[f]} cells</span></div>`;
  }
  factionDiv.innerHTML = html;
}

// ---- Controls ----
document.getElementById('btn-start').addEventListener('click', function() {
  running = true;
  this.classList.add('active');
  document.getElementById('btn-pause').classList.remove('active');
});
document.getElementById('btn-pause').addEventListener('click', function() {
  running = false;
  this.classList.add('active');
  document.getElementById('btn-start').classList.remove('active');
});
document.getElementById('btn-step').addEventListener('click', () => {
  running = false;
  document.getElementById('btn-pause').classList.add('active');
  document.getElementById('btn-start').classList.remove('active');
  engine.step();
  renderer.drawAll(engine);
  updateUI();
});

document.getElementById('slider-speed').addEventListener('input', function() {
  stepsPerFrame = parseInt(this.value);
  document.getElementById('speed-val').textContent = stepsPerFrame + 'x';
});

document.getElementById('slider-cells').addEventListener('input', function() {
  const n = parseInt(this.value);
  document.getElementById('cells-val').textContent = n;
  engine.resize(n, document.getElementById('sel-topo').value);
});

document.getElementById('sel-topo').addEventListener('change', function() {
  engine.resize(engine.nCells, this.value);
});

document.getElementById('slider-noise').addEventListener('input', function() {
  const v = parseInt(this.value) / 100;
  engine.noiseLevel = v * 100;
  document.getElementById('noise-val').textContent = v.toFixed(2);
});

// ---- Main loop ----
function frame() {
  if (running) {
    for (let i = 0; i < stepsPerFrame; i++) engine.step();
    renderer.drawAll(engine);
    updateUI();
  }
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
