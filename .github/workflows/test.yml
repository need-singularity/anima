name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('anima/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest torch numpy scipy
          if [ -f anima/requirements.txt ]; then
            pip install -r anima/requirements.txt || true
          fi

      - name: Run tests
        env:
          PYTHONPATH: anima/src:anima/tests
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          cd anima && python -m pytest tests/ -v --tb=short -x \
            --ignore=tests/test_vision_encoder.py \
            --ignore=tests/test_senses_integration.py \
            --ignore=tests/test_lidar_sense.py \
            -k "not eeg and not brainflow and not camera"

  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            anima/anima-rs/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('anima/anima-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: anima/anima-rs
        run: cargo test --workspace
