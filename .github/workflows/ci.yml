name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('anima/requirements.txt', 'pyproject.toml', 'anima-agent/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install anima package
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e . || pip install torch numpy scipy websockets

      - name: Install anima-agent package
        run: |
          pip install -e ./anima-agent || true

      - name: Run anima tests
        env:
          PYTHONPATH: anima/src:anima/tests
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          cd anima && python -m pytest tests/ -x -q \
            --ignore=tests/test_vision_encoder.py \
            --ignore=tests/test_senses_integration.py \
            --ignore=tests/test_lidar_sense.py \
            --ignore=tests/test_chat_v9.py \
            -k "not eeg and not brainflow and not camera and not faiss"

      - name: Run agent tests
        env:
          PYTHONPATH: anima/src:anima-agent
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          if [ -f anima-agent/test_e2e.py ]; then
            cd anima-agent && python -m pytest test_e2e.py -x -q || true
          fi

  bench-verify:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('anima/requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install torch numpy scipy

      - name: Run bench verify
        env:
          PYTHONPATH: anima/src
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          cd anima && python benchmarks/bench_v2.py --verify || echo "::warning::bench_v2 --verify failed (non-blocking)"

  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            anima/anima-rs/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('anima/anima-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: anima/anima-rs
        env:
          RUST_MIN_STACK: 8388608
        run: cargo test --workspace
