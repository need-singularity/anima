# ============================================================================
# CI — Anima 단일 CI 파이프라인
# ============================================================================
#
# [트러블슈팅 — 재발 방지 기록]
#
# 2026-03-31 (commit 2733b09 ~ 1e8495a): python-tests 3.12/3.13 반복 실패
#   증상: test_novelty.py 수집 시 "ModuleNotFoundError: No module named 'scipy'"
#   원인1: test_novelty.py가 --ignore 목록에 누락됨
#     → test_novelty.py는 standalone 검증 도구 (--checkpoint 필수)이지 pytest 아님
#   원인2: scipy는 pyproject.toml optional dep [eeg]. pip install -e . 성공 시
#     || fallback이 실행 안 되어 scipy 미설치.
#   원인3: test_novelty.py에 try/except ImportError 있으나, pytest --import-mode=prepend
#     (기본값)에서 conftest 없는 환경 + PYTHONPATH 불일치 시 수집 단계에서 실패.
#   해결: --ignore=tests/test_novelty.py 추가 (commit 99efdaa)
#
# [ignore 목록 관리 규칙]
#   - standalone 도구 (argparse/--checkpoint 필요): --ignore 필수
#   - 외부 HW 의존 (EEG/camera/lidar): --ignore 필수
#   - 새 test_*.py 추가 시 반드시 CI 호환 확인!
#   - -k 필터: optional dep 기반 테스트는 키워드로 제외
#
# [의존성 규칙]
#   - pip install -e . || fallback 패턴 주의: -e . 성공하면 fallback 안 됨
#   - optional dep (scipy, websockets 등)이 테스트에 필요하면 명시 설치할 것
#
# [중복 워크플로우 통합 이력]
#   2026-04-01: test.yml + verify.yml → ci.yml 통합
#     이유: ignore 목록이 3개 파일에 분산 → 동기화 실패의 근본 원인
#     verify.yml의 py_compile 검증 → verify-syntax job으로 이관
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # py_compile 검증 (구 verify.yml 통합)
  verify-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install torch numpy
      - name: Compile-check all src/*.py
        run: |
          python -c "
          import py_compile, os
          broken = []
          for f in sorted(os.listdir('anima/src')):
              if f.endswith('.py') and not f.startswith('__'):
                  try: py_compile.compile(f'anima/src/{f}', doraise=True)
                  except: broken.append(f)
          print(f'OK: {len(os.listdir(\"anima/src\"))-len(broken)}, Broken: {len(broken)}')
          if broken: print(broken); exit(1)
          "

  python-tests:
    needs: verify-syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('anima/requirements.txt', 'pyproject.toml', 'anima-agent/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      # [중요] pip install -e . 가 성공해도 scipy/websockets는 optional이라
      # 설치 안 됨. 테스트에 필요한 dep은 반드시 명시 설치. fallback(||) 의존 금지!
      - name: Install anima package
        run: |
          python -m pip install --upgrade pip
          pip install pytest scipy websockets
          pip install -e . || pip install torch numpy

      - name: Install anima-agent package
        run: |
          pip install -e ./anima-agent || true

      - name: Run anima tests
        env:
          PYTHONPATH: anima/src:anima/tests
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          cd anima && python -m pytest tests/ -x -q \
            --ignore=tests/test_vision_encoder.py \
            --ignore=tests/test_senses_integration.py \
            --ignore=tests/test_lidar_sense.py \
            --ignore=tests/test_chat_v9.py \
            --ignore=tests/test_novelty.py \
            -k "not eeg and not brainflow and not camera and not faiss"
          # [ignore 사유]
          #   test_vision_encoder.py     — transformers/SigLIP 필요 (CI 미설치)
          #   test_senses_integration.py — OpenCV/camera HW 의존
          #   test_lidar_sense.py        — lidar HW 의존
          #   test_chat_v9.py            — 모델 체크포인트 필요
          #   test_novelty.py            — standalone 도구 (--checkpoint 필수)

      - name: Run agent tests
        env:
          PYTHONPATH: anima/src:anima-agent
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          if [ -f anima-agent/test_e2e.py ]; then
            cd anima-agent && python -m pytest test_e2e.py -x -q || true
          fi

  bench-verify:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('anima/requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scipy
          pip install -e . || pip install torch numpy

      - name: Run bench verify
        env:
          PYTHONPATH: anima/src
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          cd anima && python benchmarks/bench_v2.py --verify || echo "::warning::bench_v2 --verify failed (non-blocking)"

  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            anima/anima-rs/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('anima/anima-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: anima/anima-rs
        env:
          RUST_MIN_STACK: 8388608
        run: cargo test --workspace
