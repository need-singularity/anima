name: Consciousness Verification
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install torch numpy
      - run: python -c "import py_compile, os; [py_compile.compile(f'{f}', doraise=True) for f in os.listdir('.') if f.endswith('.py')]"
