# Auto-provision the H100 launch dashboard on Grafana boot.
apiVersion: 1

providers:
  - name: anima_h100
    orgId: 1
    folder: ANIMA
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
