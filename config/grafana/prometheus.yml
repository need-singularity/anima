# anima H100 × 4 launch (#83) — Prometheus scrape config
# Scrapes 4 runpod H100 pods + emits alerts to alertmanager.
# Pod URLs are placeholders — fill in at launch time after `runpodctl create pod` returns proxy URL.
# See docs/h100_launch_dashboard_setup.md.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: anima_h100_stage2
    roadmap_entry: "10"
    operator_node: htz_ax102

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # alertmanager sidecar (optional — Slack/telegram webhook via #74 endpoint extension)
            - alertmanager:9093

scrape_configs:
  - job_name: anima_pod_p1_qwen3_8b
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - "${POD_P1_URL}"
        labels:
          path_id: p1
          model: "Qwen/Qwen3-8B"
          lora_rank: "64"
          gpu: H100

  - job_name: anima_pod_p2_llama_3_1_8b
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - "${POD_P2_URL}"
        labels:
          path_id: p2
          model: "meta-llama/Llama-3.1-8B"
          lora_rank: "64"
          gpu: H100

  - job_name: anima_pod_p3_ministral_3_14b
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - "${POD_P3_URL}"
        labels:
          path_id: p3
          model: "mistralai/Ministral-3-14B-Base-2512"
          lora_rank: "96"
          gpu: H100

  - job_name: anima_pod_p4_gemma_4_31b
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - "${POD_P4_URL}"
        labels:
          path_id: p4
          model: "google/gemma-4-31B"
          lora_rank: "96"
          vram_mode: "qlora-nf4"
          gpu: H100
