# Auto-provision the Prometheus datasource. UID must match dashboard panel datasource.uid (PROM).
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: PROM
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
