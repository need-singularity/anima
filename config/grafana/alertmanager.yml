# anima H100 × 4 launch — Alertmanager routing
# Slack/Telegram receivers placeholder until #74 endpoint extension ships.

global:
  resolve_timeout: 5m

route:
  receiver: default_slack
  group_by: ["alertname", "deployment"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical_dual
      continue: true

receivers:
  - name: default_slack
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#anima-h100-launch"
        send_resolved: true
        title: "[anima h100 stage-2] {{ .CommonAnnotations.summary }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\nrunbook: {{ .Annotations.runbook }}\n{{ end }}"

  - name: critical_dual
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#anima-h100-launch"
        send_resolved: true
        title: "[CRITICAL] {{ .CommonAnnotations.summary }}"
    webhook_configs:
      # Telegram via generic webhook bridge (#74 extension)
      - url: "${TELEGRAM_WEBHOOK_URL}"
        send_resolved: true
