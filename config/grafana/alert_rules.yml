# anima H100 × 4 launch (#83) — Prometheus alert rules
# Routes through alertmanager → Slack/Telegram (#74 endpoint extension).

groups:
  - name: anima_h100_stage2
    interval: 30s
    rules:

      # 1. Budget burn — 80% of $1500 hard cap = $1200
      - alert: BudgetBurn80Pct
        expr: sum(cost_usd_so_far) > 1200
        for: 1m
        labels:
          severity: warning
          deployment: anima_h100_stage2
          roadmap_entry: "10"
        annotations:
          summary: "Stage-2 spend at {{ $value | printf \"%.0f\" }} USD (>=80% of $1500 cap)"
          description: "Aggregate cost_usd_so_far across 4 H100 pods has exceeded $1200. Hard cap = $1500. Review per-pod burn and consider h100_auto_kill on highest spender."
          runbook: "docs/h100_launch_dashboard_setup.md#budget-burn"

      # 2. Loss NaN/Inf detect — any path
      - alert: LossNaN
        expr: (loss != loss) or (loss == +Inf) or (loss == -Inf)
        for: 30s
        labels:
          severity: critical
          deployment: anima_h100_stage2
          roadmap_entry: "10"
        annotations:
          summary: "NaN/Inf loss on path {{ $labels.path_id }} ({{ $labels.model }})"
          description: "Pod {{ $labels.path_id }} is emitting non-finite loss. numerical_drift_bound=0.0002 should self-abort; if not, kill manually."
          runbook: "docs/h100_launch_dashboard_setup.md#loss-nan"

      # 3. Φ divergence — cross-path stddev/mean above gate threshold (0.05)
      - alert: PhiDivergence
        expr: (stddev(phi_value) by () / avg(phi_value) by ()) > 0.05
        for: 5m
        labels:
          severity: critical
          deployment: anima_h100_stage2
          roadmap_entry: "10"
        annotations:
          summary: "|ΔΦ|/Φ across 4 paths = {{ $value | printf \"%.4f\" }} (gate < 0.05)"
          description: "Substrate independence gate at risk. cross_path_gate.threshold=0.05 ALL_PAIRS mode (6 pairs). If sustained beyond Stage-2 close, substrate_indep=false will block Stage-3 cascade."
          runbook: "docs/h100_launch_dashboard_setup.md#phi-divergence"
