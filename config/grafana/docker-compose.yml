# anima H100 × 4 launch (#83) — Grafana + Prometheus stack on htz (Hetzner ax102 CPU node)
# Boot:    docker compose -f config/grafana/docker-compose.yml up -d
# Teardown: docker compose -f config/grafana/docker-compose.yml down -v
# Env vars (set on htz before boot):
#   POD_P1_URL POD_P2_URL POD_P3_URL POD_P4_URL  — runpod proxy URLs (host:port)
#   SLACK_WEBHOOK_URL or TELEGRAM_WEBHOOK_URL    — #74 endpoint extension (optional)
#   GRAFANA_ADMIN_PASSWORD                       — admin password for Grafana UI

version: "3.8"

services:

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: anima_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - POD_P1_URL=${POD_P1_URL:-pod-p1.placeholder.runpod.net:9100}
      - POD_P2_URL=${POD_P2_URL:-pod-p2.placeholder.runpod.net:9100}
      - POD_P3_URL=${POD_P3_URL:-pod-p3.placeholder.runpod.net:9100}
      - POD_P4_URL=${POD_P4_URL:-pod-p4.placeholder.runpod.net:9100}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: anima_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme_at_launch}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./h100_launch_dashboard.json:/var/lib/grafana/dashboards/h100_launch.json:ro
      - ./grafana_provisioning_dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana_provisioning_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: anima_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/PLACEHOLDER}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-https://api.telegram.org/botPLACEHOLDER}
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
