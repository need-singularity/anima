<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Anima Avatar Sync Test — v2.0_RC criterion #2</title>
<style>
  body {
    background: #0b0f15;
    color: #d8e4f5;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    margin: 0;
    padding: 32px;
    min-height: 100vh;
  }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: #7a8ca8; font-size: 12px; margin-bottom: 24px; }
  .row { display: flex; gap: 32px; align-items: flex-start; }
  .avatar {
    width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #2a3750 0%, #111822 70%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 0 60px rgba(80,140,255,0.08);
  }
  .eyes {
    position: absolute; top: 92px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 40px;
  }
  .eye {
    width: 20px; height: 20px; border-radius: 50%;
    background: #e8f1ff;
  }
  #anima-mouth {
    width: 70px; height: 28px;
    background: #ff8a9a;
    border-radius: 40%;
    margin-top: 110px;
    transform: scale(1.00, 0.40);
    transition: transform 45ms linear;
    box-shadow: 0 0 16px rgba(255, 120, 140, 0.35);
  }
  .panel {
    flex: 1; max-width: 540px;
    background: #0f1622; border: 1px solid #1c2938;
    padding: 20px; border-radius: 10px;
  }
  button {
    background: #1f3352; color: #e0ebff;
    border: 1px solid #2c4974;
    padding: 8px 14px; border-radius: 6px;
    font-size: 13px; cursor: pointer; margin: 4px 6px 4px 0;
  }
  button:hover { background: #27436c; }
  .stat { font-family: "SF Mono", Menlo, monospace; font-size: 12px; color: #8fb7f2; }
  .stat b { color: #e6f0ff; }
  .bar { height: 6px; background: #1a2433; border-radius: 3px; margin-top: 4px; }
  .bar > span { display: block; height: 100%; background: #4d7dff; border-radius: 3px; transition: width .1s linear; }
  .log {
    font-family: "SF Mono", Menlo, monospace; font-size: 11px;
    background: #07101c; border: 1px solid #152132;
    padding: 10px; border-radius: 6px;
    max-height: 180px; overflow-y: auto; white-space: pre;
    color: #6b8fbe;
  }
  .drift-bad { color: #ff7a7a !important; }
  .drift-ok  { color: #7affa8 !important; }
</style>
</head>
<body>
<h1>Anima Avatar Sync — drift probe</h1>
<div class="sub">v2.0_RC destination criterion #2. Target &lt;200 ms E2E sync. Budget warn &gt;50 ms drift.</div>

<div class="row">
  <div class="avatar">
    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
    <div id="anima-mouth"></div>
  </div>
  <div class="panel">
    <div>
      <button id="btn-hello">▶ play "hello"</button>
      <button id="btn-anyeong">▶ play "안녕하세요"</button>
      <button id="btn-stop">■ stop</button>
      <button id="btn-run-all">▶▶ run both (drift sweep)</button>
    </div>
    <div class="stat" style="margin-top:16px;">
      current viseme: <b id="stat-viseme">—</b>
      &nbsp; stage: <b id="stat-stage">—</b>
      <br />
      drift now: <b id="stat-drift">0.0</b> ms
      &nbsp; max: <b id="stat-max">0.0</b> ms
      &nbsp; mean: <b id="stat-mean">0.0</b> ms
      <div class="bar"><span id="stat-bar" style="width:0%"></span></div>
    </div>
    <div class="stat" style="margin-top:14px;">
      budget: <b>50 ms</b> &nbsp;
      status: <b id="stat-status" class="drift-ok">idle</b>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script src="avatar_sync.js"></script>
<script>
(function () {
    'use strict';

    const mouthEl = document.getElementById('anima-mouth');
    const logEl = document.getElementById('log');
    const statV = document.getElementById('stat-viseme');
    const statS = document.getElementById('stat-stage');
    const statD = document.getElementById('stat-drift');
    const statM = document.getElementById('stat-max');
    const statMe = document.getElementById('stat-mean');
    const statBar = document.getElementById('stat-bar');
    const statStatus = document.getElementById('stat-status');

    function log(s) {
        const ts = (performance.now() / 1000).toFixed(3);
        logEl.textContent += '[' + ts + '] ' + s + '\n';
        logEl.scrollTop = logEl.scrollHeight;
    }

    const avatar = new window.AvatarSync({
        mouth: mouthEl,
        driftBudget: 50,
        onStage: function (i, v, drift) {
            statV.textContent = v;
            statS.textContent = i;
            statD.textContent = drift.toFixed(2);
            const pct = Math.min(100, (drift / 200.0) * 100.0);
            statBar.style.width = pct.toFixed(1) + '%';
            const st = avatar.stats();
            statM.textContent = st.max_drift_ms.toFixed(2);
            statMe.textContent = st.mean_drift_ms.toFixed(2);
            const ok = st.within_budget;
            statStatus.textContent = ok ? 'OK <50ms' : 'OVER BUDGET';
            statStatus.className = ok ? 'drift-ok' : 'drift-bad';
        },
        onDriftWarn: function (d) {
            log('drift warn ' + d.toFixed(2) + ' ms');
        }
    });

    // ─── Mock timelines (consumers can swap with serving payload) ──
    //
    // "hello" — 5 phonemes: h/e/l/o (silence start).
    const T_HELLO = [
        { t_ms:   0, viseme: '_' },
        { t_ms:  40, viseme: 'E' },   // he
        { t_ms: 140, viseme: 'E' },   // ll(e)
        { t_ms: 240, viseme: 'O' },   // o
        { t_ms: 360, viseme: '_' }
    ];

    // "안녕하세요" — 5 syllables, 5 vowels (ㅏ/ㅕ/ㅏ/ㅔ/ㅛ)
    //   an nyeong ha se yo
    //   ㅏ →A / ㅕ→E / ㅏ→A / ㅔ→E / ㅛ→O
    const T_ANYEONG = [
        { t_ms:   0, viseme: '_' },
        { t_ms:  20, viseme: 'A' },
        { t_ms: 120, viseme: 'E' },
        { t_ms: 240, viseme: 'A' },
        { t_ms: 340, viseme: 'E' },
        { t_ms: 440, viseme: 'O' },
        { t_ms: 560, viseme: '_' }
    ];

    function play(label, timeline, duration_s) {
        const ctx = avatar.ensureCtx();
        const buf = window.AvatarSync.mockAudio(ctx, duration_s);
        const info = avatar.playBuffer(buf, timeline);
        log('playing "' + label + '" — ' + info.timeline_n + ' visemes / ' + info.duration_ms + ' ms');
    }

    document.getElementById('btn-hello').onclick = function () {
        play('hello', T_HELLO, 0.42);
    };
    document.getElementById('btn-anyeong').onclick = function () {
        play('안녕하세요', T_ANYEONG, 0.62);
    };
    document.getElementById('btn-stop').onclick = function () {
        avatar.stop();
        log('stopped. final stats: ' + JSON.stringify(avatar.stats()));
    };
    document.getElementById('btn-run-all').onclick = function () {
        play('hello', T_HELLO, 0.42);
        setTimeout(function () { play('안녕하세요', T_ANYEONG, 0.62); }, 600);
        setTimeout(function () {
            const st = avatar.stats();
            log('drift sweep final — max=' + st.max_drift_ms.toFixed(2)
                + ' mean=' + st.mean_drift_ms.toFixed(2)
                + ' budget_ok=' + st.within_budget);
        }, 1400);
    };

    // ─── Headless probe: invoked by E2E harness (not a browser) ───
    // If loaded without a DOM (e.g. jsdom), fall through; the hexa
    // smoke test uses the backend adapter, not this page.
    log('ready. click a play button — drift clock starts.');
})();
</script>
</body>
</html>
