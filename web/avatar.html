<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Anima Avatar — Webtoon Style</title><script src='https://pixijs.download/release/pixi.min.js'></script><style>* { margin:0; padding:0; box-sizing:border-box; }body { background:#0b0f15; color:#d8e4f5; font-family:'Noto Sans KR',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }.header { padding:16px; font-size:14px; opacity:0.6; }#avatar-container { width:400px; height:500px; border-radius:16px; overflow:hidden; background:#111827; box-shadow:0 0 30px rgba(99,102,241,0.15); }.controls { display:flex; flex-wrap:wrap; gap:8px; padding:16px; justify-content:center; }.controls button { background:#1e293b; color:#d8e4f5; border:1px solid #334155; border-radius:8px; padding:8px 14px; cursor:pointer; font-size:13px; transition:all 0.2s; }.controls button:hover { background:#334155; border-color:#6366f1; }.controls button.active { background:#6366f1; border-color:#818cf8; }.info { display:flex; gap:24px; padding:8px 16px; font-size:13px; opacity:0.7; }.persona-select { background:#1e293b; color:#d8e4f5; border:1px solid #334155; border-radius:8px; padding:8px 12px; font-size:13px; }</style></head><body><div class='header'>Anima Avatar — Multi-Style (PixiJS 60fps)</div><div id='avatar-container'></div><div class='controls' id='expr-btns'></div><div class='controls'><select class='persona-select' id='persona-sel'><option value='0'>school_idol</option><option value='1'>senpai</option><option value='2'>knight</option><option value='3'>sorceress</option><option value='4'>noir_detective</option><option value='5'>horror_whisper</option><option value='6'>childhood_friend</option><option value='7'>demon_lord</option><option value='8'>childlike</option><option value='9'>stoic_mentor</option><option value='10'>ice_queen</option><option value='11'>chaebol_heir</option><option value='12'>pure_heroine</option><option value='13'>tsundere_oppa</option><option value='14'>airhead_friend</option><option value='15'>charismatic_prez</option><option value='16'>thug_returnee</option><option value='17'>cold_heiress</option><option value='18'>gentle_oppa</option><option value='19'>fallen_antagonist</option></select><select class='persona-select' id='style-sel'><option value='webtoon'>Webtoon</option><option value='adventure'>Adventure Time</option></select><span class='info' id='info-fps'>FPS: --</span><span class='info' id='info-expr'>Expression: neutral</span></div><script>const EXPR_NAMES=['neutral','happy','sad','angry','surprised','fearful','disgusted'];const EXPR_PARAMS=[[1.0,0,0,0,0,0],[0.7,-2,10,1.0,0.3,0.6],[0.9,3,-15,-0.8,0.1,0],[0.8,-1,-25,-0.6,0.2,0.3],[1.4,0,20,0,0.9,0],[1.3,2,15,-0.3,0.5,0],[0.85,1,-10,-0.9,0.15,0]];const VISEME_PARAMS=[[0.3,0.05,0],[0.15,0.1,1],[0.25,0.15,0.3],[0.3,0.2,0.2],[0.35,0.25,0.4],[0.3,0.3,0.5],[0.35,0.35,0.6],[0.2,0.15,0.3],[0.25,0.1,0.4],[0.3,0.2,0.5],[0.5,0.6,0.8],[0.4,0.4,0.6],[0.3,0.3,0.5],[0.4,0.5,0.9],[0.25,0.4,1.0]];const PALETTES=[['#ff69b4,#e91e8c,#ffe4c4,#ff1493,#ff69b4'.split(',')],['#4a4a6a,#6a5acd,#f5deb3,#7b68ee,#dda0dd'.split(',')],['#4169e1,#1e90ff,#f0d9b5,#4682b4,#87ceeb'.split(',')],['#9932cc,#8a2be2,#faebd7,#9400d3,#da70d6'.split(',')],['#2f4f4f,#708090,#d2b48c,#696969,#a9a9a9'.split(',')],['#1a1a2e,#8b0000,#c9b99a,#dc143c,#ff4444'.split(',')],['#f4a460,#d2691e,#ffdead,#ff8c00,#ffd700'.split(',')],['#4b0082,#ff0000,#d2b48c,#8b0000,#ff6347'.split(',')],['#ffb6c1,#ff69b4,#fff0f5,#ff1493,#ffc0cb'.split(',')],['#556b2f,#2e8b57,#deb887,#228b22,#90ee90'.split(',')],['#1e1e2e,#c9184a,#f5e6d3,#ff477e,#ff8fa3'.split(',')],['#2d2d44,#0077b6,#ffe0c4,#023e8a,#90e0ef'.split(',')],['#d4a373,#faedcd,#fff8dc,#e9c46a,#ffd7ba'.split(',')],['#3d2b1f,#8b4513,#f5deb3,#d2691e,#ffa07a'.split(',')],['#9d4edd,#c77dff,#ffeef4,#e0aaff,#f0c3ff'.split(',')],['#0d1b2a,#e63946,#f5e6d3,#a8dadc,#f1faee'.split(',')],['#1a1a1a,#ffd60a,#c9b99a,#ff9f1c,#ffbf69'.split(',')],['#e0e0e0,#7209b7,#fff0f5,#560bad,#b5179e'.split(',')],['#5a3825,#8d6e63,#ffe4c4,#a0522d,#d2b48c'.split(',')],['#0b0b0f,#8b0000,#b8a899,#4a0e0e,#6a0dad'.split(',')]];const W=400,H=500,INTERP=200,SYNC_TOL=50;let app,face={},curExpr=0,tgtExpr=0,exprT=1,curViseme=0,persona=0,frameCount=0,lastFps=0,fpsTimer=0,artStyle='webtoon';function lerp(a,b,t){return a+(b-a)*Math.min(1,Math.max(0,t));}function hexToNum(h){return parseInt(h.replace('#',''),16);}async function init(){app=new PIXI.Application();await app.init({width:W,height:H,background:0x111827,antialias:true});document.getElementById('avatar-container').appendChild(app.canvas);buildFace();buildButtons();app.ticker.add(update);}function buildFace(){const c=new PIXI.Container();c.x=W/2;c.y=H/2+20;app.stage.addChild(c);face.head=new PIXI.Graphics();c.addChild(face.head);face.hair=new PIXI.Graphics();c.addChild(face.hair);c.setChildIndex(face.hair,0);face.eyeL=new PIXI.Graphics();face.eyeR=new PIXI.Graphics();c.addChild(face.eyeL);c.addChild(face.eyeR);face.hlL=new PIXI.Graphics();face.hlR=new PIXI.Graphics();c.addChild(face.hlL);c.addChild(face.hlR);face.browL=new PIXI.Graphics();face.browR=new PIXI.Graphics();c.addChild(face.browL);c.addChild(face.browR);face.mouth=new PIXI.Graphics();c.addChild(face.mouth);face.blushL=new PIXI.Graphics();face.blushR=new PIXI.Graphics();c.addChild(face.blushL);c.addChild(face.blushR);face.particles=new PIXI.Container();c.addChild(face.particles);face.container=c;}const STYLES={};function drawFace(ep,vp,pal){const fn=STYLES[artStyle]||STYLES.webtoon;fn(ep,vp,pal);}STYLES.webtoon=function(ep,vp,pal){const [es,ey,ba,mc,mo,bl]=ep;const [vw,vh,vr]=vp;const [hair,eye,skin,accent,particle]=pal;const hc=hexToNum(hair),ec=hexToNum(eye),sc=hexToNum(skin),ac=hexToNum(accent);face.head.clear();face.head.ellipse(0,0,110,140);face.head.fill(sc);face.head.ellipse(0,0,112,142);face.head.stroke({width:2,color:0x334155});face.hair.clear();face.hair.ellipse(0,-100,120,80);face.hair.fill(hc);face.hair.ellipse(-60,-60,40,50);face.hair.fill(hc);face.hair.ellipse(60,-60,40,50);face.hair.fill(hc);const eyeW=22*es,eyeH=28*es,eyeY=-20+ey;face.eyeL.clear();face.eyeL.ellipse(-38,eyeY,eyeW,eyeH);face.eyeL.fill(0xffffff);face.eyeL.circle(-38,eyeY+2,eyeW*0.55);face.eyeL.fill(ec);face.eyeL.circle(-38,eyeY+2,eyeW*0.3);face.eyeL.fill(0x111111);face.eyeR.clear();face.eyeR.ellipse(38,eyeY,eyeW,eyeH);face.eyeR.fill(0xffffff);face.eyeR.circle(38,eyeY+2,eyeW*0.55);face.eyeR.fill(ec);face.eyeR.circle(38,eyeY+2,eyeW*0.3);face.eyeR.fill(0x111111);face.hlL.clear();face.hlL.circle(-44,eyeY-4,eyeW*0.2);face.hlL.fill(0xffffff);face.hlL.circle(-34,eyeY-8,eyeW*0.1);face.hlL.fill(0xffffff);face.hlR.clear();face.hlR.circle(32,eyeY-4,eyeW*0.2);face.hlR.fill(0xffffff);face.hlR.circle(42,eyeY-8,eyeW*0.1);face.hlR.fill(0xffffff);const bRad=ba*Math.PI/180;face.browL.clear();face.browL.moveTo(-55,-50+ey);face.browL.lineTo(-20,-50+ey-Math.sin(bRad)*12);face.browL.stroke({width:3,color:hc});face.browR.clear();face.browR.moveTo(55,-50+ey);face.browR.lineTo(20,-50+ey-Math.sin(-bRad)*12);face.browR.stroke({width:3,color:hc});const mW=35*Math.max(0.3,vw+0.3),mH=15*Math.max(0.1,mo+vh),mY=45+mc*5;face.mouth.clear();if(mo>0.4){face.mouth.ellipse(0,mY,mW,mH*1.5);face.mouth.fill(0x222222);face.mouth.ellipse(0,mY-mH*0.3,mW*0.8,mH*0.4);face.mouth.fill(0xff6b6b);}else{face.mouth.moveTo(-mW,mY);face.mouth.quadraticCurveTo(0,mY+mc*25,mW,mY);face.mouth.stroke({width:3,color:0x444444});}face.blushL.clear();face.blushR.clear();if(bl>0.05){face.blushL.circle(-65,20,18);face.blushL.fill({color:0xff6b9d,alpha:bl*0.4});face.blushR.circle(65,20,18);face.blushR.fill({color:0xff6b9d,alpha:bl*0.4});}};STYLES.adventure=function(ep,vp,pal){const [es,ey,ba,mc,mo,bl]=ep;const [vw,vh,vr]=vp;const [hair,eye,skin,accent,particle]=pal;const hc=hexToNum(hair),ec=hexToNum(eye),sc=hexToNum(skin),ac=hexToNum(accent);const OUTLINE=0x000000,OW=5;face.head.clear();face.head.ellipse(0,0,115,135);face.head.fill(sc);face.head.stroke({width:OW,color:OUTLINE});face.hair.clear();face.hair.ellipse(0,-95,125,70);face.hair.fill(hc);face.hair.stroke({width:OW,color:OUTLINE});const eyeY=-15+ey,dotR=Math.max(3,6*es);face.eyeL.clear();face.eyeL.ellipse(-35,eyeY,18*es,22*es);face.eyeL.fill(0xffffff);face.eyeL.stroke({width:3,color:OUTLINE});face.eyeL.circle(-35,eyeY,dotR);face.eyeL.fill(OUTLINE);face.eyeR.clear();face.eyeR.ellipse(35,eyeY,18*es,22*es);face.eyeR.fill(0xffffff);face.eyeR.stroke({width:3,color:OUTLINE});face.eyeR.circle(35,eyeY,dotR);face.eyeR.fill(OUTLINE);face.hlL.clear();face.hlR.clear();const bRad=ba*Math.PI/180;face.browL.clear();face.browL.moveTo(-50,-45+ey);face.browL.lineTo(-22,-45+ey-Math.sin(bRad)*14);face.browL.stroke({width:5,color:OUTLINE});face.browR.clear();face.browR.moveTo(50,-45+ey);face.browR.lineTo(22,-45+ey-Math.sin(-bRad)*14);face.browR.stroke({width:5,color:OUTLINE});const mW=45*Math.max(0.4,vw+0.3),mH=20*Math.max(0.15,mo+vh),mY=50+mc*6;face.mouth.clear();if(mo>0.4){face.mouth.ellipse(0,mY,mW,mH*1.4);face.mouth.fill(OUTLINE);face.mouth.stroke({width:OW,color:OUTLINE});face.mouth.ellipse(0,mY+mH*0.4,mW*0.7,mH*0.35);face.mouth.fill(0xff4d6d);}else{face.mouth.moveTo(-mW,mY);face.mouth.quadraticCurveTo(0,mY+mc*28,mW,mY);face.mouth.stroke({width:OW,color:OUTLINE});}face.blushL.clear();face.blushR.clear();if(bl>0.5){face.blushL.circle(-65,25,14);face.blushL.fill({color:accent,alpha:0.5});face.blushR.circle(65,25,14);face.blushR.fill({color:accent,alpha:0.5});}};function update(ticker){const dt=ticker.deltaMS/1000;if(curExpr!==tgtExpr){exprT+=dt*1000/INTERP;if(exprT>=1){curExpr=tgtExpr;exprT=1;}}const ep0=EXPR_PARAMS[curExpr],ep1=EXPR_PARAMS[tgtExpr];const ep=ep0.map((v,i)=>lerp(v,ep1[i],exprT));const vp=VISEME_PARAMS[curViseme];const pal=PALETTES[persona];drawFace(ep,vp,pal);frameCount++;fpsTimer+=dt;if(fpsTimer>=1){lastFps=frameCount;frameCount=0;fpsTimer=0;document.getElementById('info-fps').textContent='FPS: '+lastFps;}}function setExpr(id){tgtExpr=id;exprT=0;document.getElementById('info-expr').textContent='Expression: '+EXPR_NAMES[id];document.querySelectorAll('#expr-btns button').forEach((b,i)=>b.classList.toggle('active',i===id));}function setViseme(id){curViseme=id;}const PH2VIS={a:10,eo:13,o:13,u:14,eu:12,i:12,ae:11,e:11,wa:10,wi:14,p:1,pp:1,b:1,m:1,t:4,tt:4,d:4,n:8,l:4,r:9,k:5,kk:5,g:5,s:7,ss:7,j:6,jj:6,ch:6,ng:8,h:0,aa:10,ee:11,ii:12,oo:13,uu:14,uh:10,ih:12,ax:11,f:2,v:2,th:3,dh:3,sh:6,zh:6,z:7,w:14,y:12,sil:0,sp:0};function setPhoneme(ph){const v=PH2VIS[ph];if(v!==undefined)curViseme=v;}window.setPhoneme=setPhoneme;window.setViseme=setViseme;window.setExpr=setExpr;window.setPersona=setPersona;window.setStyle=setStyle;function setPersona(id){persona=id;}function setStyle(s){if(STYLES[s])artStyle=s;}function buildButtons(){const c=document.getElementById('expr-btns');EXPR_NAMES.forEach((n,i)=>{const b=document.createElement('button');b.textContent=n;b.onclick=()=>setExpr(i);if(i===0)b.classList.add('active');c.appendChild(b);});document.getElementById('persona-sel').onchange=e=>setPersona(+e.target.value);document.getElementById('style-sel').onchange=e=>setStyle(e.target.value);}function demoTimeline(){let t=0;const seq=[1,4,2,3,5,6,0];setInterval(()=>{setExpr(seq[t%seq.length]);t++;},2000);}function demoLipSync(){let v=0;setInterval(()=>{setViseme(v%15);v++;},120);}init().then(()=>{demoTimeline();demoLipSync();});</script></body></html>
