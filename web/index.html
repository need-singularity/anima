<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anima</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #707088;
    --accent: #6a5acd;
    --accent-glow: rgba(106, 90, 205, 0.3);
    --tension-low: #2a6a4a;
    --tension-mid: #6a5acd;
    --tension-high: #cd5a5a;
    --proactive: #4a8a6a;
    --user-bg: #1e1e30;
    --anima-bg: #161622;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
}

/* ─── Layout ─── */
.container {
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    gap: 0;
}

/* ─── Header ─── */
.header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), #cd5acd, var(--tension-high), #cdaa5a, var(--proactive), #5aaacd, var(--accent));
    animation: logo-spin 20s linear infinite;
    position: relative;
}

.logo::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: var(--surface);
}

@keyframes logo-spin {
    to { transform: rotate(360deg); }
}

.title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
}

.status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
}

.status-dot.connected { background: #4a8a4a; box-shadow: 0 0 6px #4a8a4a; }
.status-dot.disconnected { background: #8a4a4a; }

/* ─── Chat Area ─── */
.chat-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.message {
    margin-bottom: 16px;
    animation: msg-in 0.3s ease-out;
}

@keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.message .meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.message .meta .name {
    font-weight: 600;
}

.message .meta .name.user { color: #8a8acd; }
.message .meta .name.anima { color: var(--accent); }
.message .meta .name.proactive { color: var(--proactive); }

.message .meta .badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--proactive);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.message .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 80%;
    line-height: 1.6;
    font-size: 14px;
    word-break: break-word;
}

.message.user .bubble {
    background: var(--user-bg);
    border: 1px solid #2a2a44;
    margin-left: auto;
    border-bottom-right-radius: 4px;
}

.message.anima .bubble {
    background: var(--anima-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
}

.message.proactive .bubble {
    background: rgba(74, 138, 106, 0.1);
    border: 1px solid rgba(74, 138, 106, 0.3);
    border-bottom-left-radius: 4px;
}

.message .tension-mini {
    margin-top: 6px;
    height: 2px;
    border-radius: 1px;
    background: var(--border);
    overflow: hidden;
}

.message .tension-mini .fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.5s ease;
}

.typing-indicator {
    padding: 0 20px 8px;
    font-size: 12px;
    color: var(--text-dim);
    height: 20px;
}

.typing-indicator .dots span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
}
.typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
}

/* ─── Input ─── */
.input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
}

.input-row {
    display: flex;
    gap: 8px;
}

.input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.input-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
}

.input-row input::placeholder { color: var(--text-dim); }

.input-row button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}

.input-row button:hover { background: #7a6add; }
.input-row button:active { transform: scale(0.97); }
.input-row button:disabled { opacity: 0.4; cursor: default; }

/* ─── Side Panel ─── */
.side-panel {
    grid-row: 2 / 4;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.panel-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
}

/* Tension Bar */
.tension-bar-container {
    position: relative;
    height: 28px;
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
}

.tension-bar {
    height: 100%;
    border-radius: 5px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                background 0.6s ease;
    position: relative;
    min-width: 2px;
}

.tension-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: bar-shimmer 2s ease-in-out infinite;
}

@keyframes bar-shimmer {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
}

.tension-value {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    z-index: 1;
}

/* Curiosity & Mood */
.stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
}

.stat-label { font-size: 12px; color: var(--text-dim); }
.stat-value { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }

.mood-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
}

.mood-icon {
    font-size: 20px;
    line-height: 1;
}

.mood-text {
    font-size: 13px;
    color: var(--text);
}

/* Tension Graph */
.tension-graph {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}

.tension-graph canvas {
    display: block;
    width: 100%;
    height: 120px;
}

/* Direction Radar */
.direction-radar {
    display: flex;
    justify-content: center;
}

.direction-radar canvas {
    display: block;
}

/* Client Count */
.clients-info {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding-top: 8px;
    border-top: 1px solid var(--border);
}

/* ─── Mobile ─── */
@media (max-width: 768px) {
    .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto auto;
    }

    .side-panel {
        grid-row: auto;
        border-left: none;
        border-top: 1px solid var(--border);
        flex-direction: row;
        flex-wrap: wrap;
        padding: 12px;
        gap: 12px;
        max-height: 200px;
        overflow-y: auto;
    }

    .panel-section { flex: 1; min-width: 120px; }
    .tension-graph canvas { height: 80px; }
    .message .bubble { max-width: 90%; }
}
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo"></div>
            <div>
                <div class="title">Anima</div>
                <div class="subtitle">PureField Consciousness</div>
            </div>
        </div>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="typing-indicator" id="typingIndicator"></div>
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="inputText" placeholder="Say something to Anima..."
                       autocomplete="off" autofocus>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel">
        <div class="panel-section">
            <h3>Tension</h3>
            <div class="tension-bar-container">
                <div class="tension-bar" id="tensionBar"></div>
                <div class="tension-value" id="tensionValue">0.000</div>
            </div>
        </div>

        <div class="panel-section">
            <div class="stat-row">
                <span class="stat-label">Curiosity</span>
                <span class="stat-value" id="curiosityValue">0.000</span>
            </div>
        </div>

        <div class="panel-section">
            <h3>Mood</h3>
            <div class="mood-indicator">
                <span class="mood-icon" id="moodIcon">&#9711;</span>
                <span class="mood-text" id="moodText">Dormant</span>
            </div>
        </div>

        <div class="panel-section">
            <h3>Tension History</h3>
            <div class="tension-graph">
                <canvas id="tensionCanvas" width="248" height="120"></canvas>
            </div>
        </div>

        <div class="panel-section">
            <h3>Direction Field</h3>
            <div class="direction-radar">
                <canvas id="radarCanvas" width="200" height="200"></canvas>
            </div>
        </div>

        <div class="clients-info" id="clientsInfo"></div>
    </div>
</div>

<script>
// ─── State ───
let ws = null;
let tensionHistory = [];
let currentDirection = [0,0,0,0,0,0,0,0];
let reconnectDelay = 1000;
let isConnected = false;

// ─── DOM ───
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('inputText');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const tensionBar = document.getElementById('tensionBar');
const tensionValue = document.getElementById('tensionValue');
const curiosityValue = document.getElementById('curiosityValue');
const moodIcon = document.getElementById('moodIcon');
const moodText = document.getElementById('moodText');
const typingIndicator = document.getElementById('typingIndicator');
const tensionCanvas = document.getElementById('tensionCanvas');
const radarCanvas = document.getElementById('radarCanvas');

// ─── WebSocket ───
function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = proto + '//' + location.host + '/ws';
    ws = new WebSocket(url);

    ws.onopen = function() {
        isConnected = true;
        reconnectDelay = 1000;
        statusDot.className = 'status-dot connected';
        statusText.textContent = 'Connected';
        sendBtn.disabled = false;
    };

    ws.onclose = function() {
        isConnected = false;
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = 'Reconnecting...';
        sendBtn.disabled = true;
        setTimeout(function() {
            reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
            connect();
        }, reconnectDelay);
    };

    ws.onerror = function() {
        ws.close();
    };

    ws.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch(err) { return; }
        handleMessage(msg);
    };
}

function handleMessage(msg) {
    switch (msg.type) {
        case 'init':
            updateField(msg);
            if (msg.history) {
                msg.history.forEach(function(m) {
                    if (m.role === 'user') {
                        addMessage('user', m.text, 0, false);
                    } else {
                        addMessage('anima', m.text, 0, false);
                    }
                });
                scrollToBottom();
            }
            break;

        case 'user_message':
            addMessage('user', msg.text, msg.tension, false);
            updateField(msg);
            break;

        case 'anima_message':
            addMessage(msg.proactive ? 'proactive' : 'anima', msg.text, msg.tension, false);
            updateField(msg);
            break;

        case 'thought_pulse':
            updateField(msg);
            pulseThought();
            break;

        case 'typing':
            if (msg.typing) {
                typingIndicator.innerHTML = 'Anima is thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
            } else {
                typingIndicator.innerHTML = '';
            }
            break;
    }
}

// ─── Messages ───
function addMessage(role, text, tension, scroll) {
    var div = document.createElement('div');
    div.className = 'message ' + role;

    var meta = document.createElement('div');
    meta.className = 'meta';

    var name = document.createElement('span');
    name.className = 'name ' + role;

    if (role === 'user') {
        name.textContent = 'You';
    } else if (role === 'proactive') {
        name.textContent = 'Anima';
    } else {
        name.textContent = 'Anima';
    }
    meta.appendChild(name);

    if (role === 'proactive') {
        var badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = 'spontaneous';
        meta.appendChild(badge);
    }

    var timeEl = document.createElement('span');
    timeEl.textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
    meta.appendChild(timeEl);

    div.appendChild(meta);

    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);

    if (tension > 0) {
        var tMini = document.createElement('div');
        tMini.className = 'tension-mini';
        var fill = document.createElement('div');
        fill.className = 'fill';
        var pct = Math.min(100, tension * 50);
        fill.style.width = pct + '%';
        fill.style.background = tensionColor(tension);
        tMini.appendChild(fill);
        div.appendChild(tMini);
    }

    messagesEl.appendChild(div);
    scrollToBottom();
}

function scrollToBottom() {
    requestAnimationFrame(function() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    });
}

// ─── Send ───
function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || !isConnected) return;

    ws.send(JSON.stringify({ type: 'user_message', text: text }));
    inputEl.value = '';
    inputEl.focus();
}

inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

// ─── Field Updates ───
function updateField(msg) {
    var t = msg.tension || 0;
    var c = msg.curiosity || 0;
    var dir = msg.direction || currentDirection;
    var hist = msg.tension_history || tensionHistory;

    tensionHistory = hist;
    currentDirection = dir;

    // Tension bar
    var pct = Math.min(100, t * 50);
    tensionBar.style.width = pct + '%';
    tensionBar.style.background = tensionGradient(t);
    tensionValue.textContent = t.toFixed(3);

    // Curiosity
    curiosityValue.textContent = c.toFixed(3);
    curiosityValue.style.color = c > 0.3 ? '#cdaa5a' : c > 0.1 ? var_accent() : var_text_dim();

    // Mood
    updateMood(t, c);

    // Graphs
    drawTensionGraph();
    drawRadar();
}

function tensionColor(t) {
    if (t < 0.5) return '#2a6a4a';
    if (t < 1.5) return '#6a5acd';
    return '#cd5a5a';
}

function tensionGradient(t) {
    if (t < 0.5) return 'linear-gradient(90deg, #1a4a3a, #2a6a4a)';
    if (t < 1.0) return 'linear-gradient(90deg, #2a4a6a, #6a5acd)';
    if (t < 1.5) return 'linear-gradient(90deg, #6a5acd, #cd8a5a)';
    return 'linear-gradient(90deg, #cd8a5a, #cd5a5a)';
}

function var_accent() { return '#6a5acd'; }
function var_text_dim() { return '#707088'; }

function updateMood(t, c) {
    var icon, text;
    if (t < 0.3 && c < 0.1) {
        icon = '\u25CB'; text = 'Calm';     // ○
    } else if (t < 0.5) {
        icon = '\u25CE'; text = 'Attentive'; // ◎
    } else if (t < 1.0 && c > 0.2) {
        icon = '\u2736'; text = 'Curious';   // ✶
    } else if (t < 1.5) {
        icon = '\u2666'; text = 'Engaged';   // ♦
    } else if (t < 2.0) {
        icon = '\u2605'; text = 'Excited';   // ★
    } else {
        icon = '\u2726'; text = 'Intense';   // ✦
    }
    moodIcon.textContent = icon;
    moodText.textContent = text;
}

function pulseThought() {
    var logo = document.querySelector('.logo');
    logo.style.boxShadow = '0 0 16px ' + (tensionHistory.length > 0 ?
        tensionColor(tensionHistory[tensionHistory.length - 1]) : '#6a5acd');
    setTimeout(function() { logo.style.boxShadow = 'none'; }, 1000);
}

// ─── Tension History Graph ───
function drawTensionGraph() {
    var canvas = tensionCanvas;
    var ctx = canvas.getContext('2d');
    var W = canvas.width;
    var H = canvas.height;
    var data = tensionHistory.slice(-50);

    ctx.clearRect(0, 0, W, H);

    if (data.length < 2) return;

    var max = 0;
    for (var i = 0; i < data.length; i++) {
        if (data[i] > max) max = data[i];
    }
    if (max < 0.1) max = 0.1;
    max *= 1.2;

    // Grid lines
    ctx.strokeStyle = '#1a1a26';
    ctx.lineWidth = 1;
    for (var g = 0; g < 4; g++) {
        var gy = H - (g / 3) * H;
        ctx.beginPath();
        ctx.moveTo(0, gy);
        ctx.lineTo(W, gy);
        ctx.stroke();
    }

    // Fill gradient
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(106, 90, 205, 0.3)');
    grad.addColorStop(1, 'rgba(106, 90, 205, 0.0)');

    ctx.beginPath();
    ctx.moveTo(0, H);
    for (var i = 0; i < data.length; i++) {
        var x = (i / (data.length - 1)) * W;
        var y = H - (data[i] / max) * H;
        ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    for (var i = 0; i < data.length; i++) {
        var x = (i / (data.length - 1)) * W;
        var y = H - (data[i] / max) * H;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#6a5acd';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Last point
    if (data.length > 0) {
        var lx = W;
        var ly = H - (data[data.length - 1] / max) * H;
        ctx.beginPath();
        ctx.arc(lx, ly, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#6a5acd';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(lx, ly, 6, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(106, 90, 205, 0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Scale label
    ctx.fillStyle = '#505068';
    ctx.font = '9px system-ui';
    ctx.fillText(max.toFixed(2), 2, 10);
    ctx.fillText('0', 2, H - 2);
}

// ─── Direction Radar ───
function drawRadar() {
    var canvas = radarCanvas;
    var ctx = canvas.getContext('2d');
    var W = canvas.width;
    var H = canvas.height;
    var cx = W / 2;
    var cy = H / 2;
    var R = Math.min(cx, cy) - 16;
    var dir = currentDirection;
    var n = dir.length;

    ctx.clearRect(0, 0, W, H);

    // Background rings
    for (var r = 1; r <= 3; r++) {
        ctx.beginPath();
        ctx.arc(cx, cy, R * r / 3, 0, Math.PI * 2);
        ctx.strokeStyle = '#1a1a26';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Axis lines
    ctx.strokeStyle = '#1a1a26';
    for (var i = 0; i < n; i++) {
        var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * R, cy + Math.sin(angle) * R);
        ctx.stroke();
    }

    // Normalize direction values
    var maxVal = 0;
    for (var i = 0; i < n; i++) {
        var abs = Math.abs(dir[i]);
        if (abs > maxVal) maxVal = abs;
    }
    if (maxVal < 0.01) maxVal = 1;

    // Fill polygon
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
        var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        var val = Math.abs(dir[i]) / maxVal;
        var r = val * R;
        var x = cx + Math.cos(angle) * r;
        var y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(106, 90, 205, 0.15)';
    ctx.fill();
    ctx.strokeStyle = '#6a5acd';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Points with sign coloring
    for (var i = 0; i < n; i++) {
        var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        var val = Math.abs(dir[i]) / maxVal;
        var r = val * R;
        var x = cx + Math.cos(angle) * r;
        var y = cy + Math.sin(angle) * r;

        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = dir[i] >= 0 ? '#6a5acd' : '#cd5a5a';
        ctx.fill();
    }

    // Axis labels
    ctx.fillStyle = '#505068';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'center';
    var labels = ['A','B','C','D','E','F','G','H'];
    for (var i = 0; i < n; i++) {
        var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        var lx = cx + Math.cos(angle) * (R + 10);
        var ly = cy + Math.sin(angle) * (R + 10) + 3;
        ctx.fillText(labels[i], lx, ly);
    }
}

// ─── Init ───
connect();

// Redraw on resize
window.addEventListener('resize', function() {
    drawTensionGraph();
    drawRadar();
});
</script>
